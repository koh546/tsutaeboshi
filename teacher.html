<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伝え星（つたえぼし） - 教員用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: "Hiragino Sans", "Meiryo", sans-serif;
        background: #0b1020;
        color: white;
        min-height: 100vh;
        padding: 24px;
    }
    .page-wrap {
        max-width: 900px;
        margin: 0 auto;
    }
    h1 {
        margin: 0 0 4px 0;
        font-size: 28px;
        color: #ffe066;
    }
    .subtitle {
        color: #9fb3ff;
        margin-bottom: 24px;
    }
    .panel {
        background: #111a33;
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 20px;
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
    }
    label {
        display: block;
        margin-bottom: 6px;
        color: #9fb3ff;
        font-size: 14px;
    }
    .field {
        margin-bottom: 16px;
    }
    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #1c2a55;
        color: white;
        font-size: 16px;
    }
    button {
        background: #2b4cff;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover { background: #1a35cc; }
    button:disabled { background: #3a4166; cursor: not-allowed; }

    #sessionPanel { display: none; }
    .session-info {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        align-items: flex-start;
    }
    #qrcode {
        background: white;
        padding: 12px;
        border-radius: 8px;
        display: inline-block;
    }
    .join-url {
        margin-top: 10px;
        font-size: 13px;
        color: #9fb3ff;
        word-break: break-all;
        max-width: 260px;
    }
    .session-id {
        font-size: 14px;
        color: #9fb3ff;
    }
    .session-id b {
        color: #ffe066;
        font-size: 20px;
        letter-spacing: 2px;
    }
    #participantList {
        list-style: none;
        padding: 0;
        margin: 12px 0 0 0;
        min-width: 220px;
    }
    #participantList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
    }
    #participantCount {
        color: #ffe066;
        font-weight: bold;
    }
    .empty-note {
        color: #6a76a8;
        font-size: 14px;
    }
    #progressList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
        display: flex;
        justify-content: space-between;
    }
    .status-submitted { color: #6bffb0; }
    .status-pending { color: #ffb066; }
    .status-guessonly { color: #9fb3ff; }

    #startPresentBtn { margin-top: 16px; display: none; }

    #presentPanel {
        display: none;
        max-width: 900px;
    }
    .present-progress {
        color: #9fb3ff;
        font-size: 14px;
        margin-bottom: 10px;
    }
    #constellationView {
        position: relative;
        height: 55vh;
        background: radial-gradient(circle at center, #0b1a3a, #050814);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    #constellationView .piece {
        position: absolute;
        color: white;
        font-size: 22px;
        text-shadow: 0 0 6px rgba(255,255,255,0.7);
        transform-origin: center center;
        white-space: nowrap;
    }
    .present-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }
    .hint-answer-box {
        background: #1c2a55;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 16px;
        min-height: 24px;
        font-size: 18px;
    }
    #answerText { color: #6bffb0; font-weight: bold; }
    .za-suffix { font-size: 0.82em; }
    ruby rt {
        font-size: 0.55em;
        color: #cdd7ff;
    }

    /* 星のかけらゲージ */
    .star-gauge {
        color: #ffe066;
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 10px;
    }

    /* ４択の一覧（正解＋３つ、画像検索リンク付き） */
    .choice-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
    }
    .choice-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #26315c;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 16px;
    }
    .choice-chip .choice-label {
        color: #ffe066;
        font-weight: bold;
    }
    .choice-chip a {
        color: #9fb3ff;
        font-size: 13px;
        text-decoration: none;
        border-bottom: 1px dotted #9fb3ff;
    }
    .choice-chip a:hover { color: #ffe066; }

    /* 出題者以外、一人ずつの回答欄 */
    .answerer-list { margin-bottom: 10px; }
    .answerer-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        background: #161f3d;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
    }
    .answerer-name {
        min-width: 84px;
        font-weight: bold;
        color: white;
    }
    .answerer-choice-btn {
        background: #26315c;
        border: 2px solid transparent;
        border-radius: 6px;
        padding: 6px 12px;
        color: white;
        cursor: pointer;
        font-size: 15px;
    }
    .answerer-choice-btn.selected {
        border-color: #ffe066;
        background: #3a4166;
    }
    .answerer-choice-btn.correct {
        background: #1f7a4d;
        border-color: #6bffb0;
    }
    .answerer-choice-btn.incorrect {
        background: #7a2020;
        border-color: #ff8a8a;
        opacity: 0.75;
    }
    .answerer-result-icon {
        font-size: 20px;
        font-weight: bold;
        min-width: 24px;
        text-align: center;
    }
    #noHintCorrectBtn { background: #7a4fc7; }
    #noHintCorrectBtn:hover { background: #603c9e; }

    /* 出題者の名前（最初から表示） */
    .presenter-name {
        font-size: 20px;
        font-weight: bold;
        color: #ffe066;
        margin-bottom: 8px;
        text-align: center;
    }

    /* 欠けた星の進捗ビジュアル（星のかけらを集めるほど星が満ちていく） */
    .star-progress-wrap {
        position: relative;
        width: 56px;
        height: 56px;
        margin: 0 auto 8px auto;
        font-size: 52px;
        line-height: 56px;
        text-align: center;
    }
    .star-progress-bg, .star-progress-fill {
        position: absolute;
        inset: 0;
    }
    .star-progress-bg {
        color: #263257;
    }
    .star-progress-fill {
        color: #ffe066;
        text-shadow: 0 0 12px rgba(255, 224, 102, 0.85);
        overflow: hidden;
        clip-path: inset(100% 0 0 0);
        transition: clip-path 0.5s ease;
    }
    .star-gauge { text-align: center; }

    /* ４択チップの下に、誰がそれを選んだかを表示するタグ */
    .choice-chip { flex-direction: column; align-items: flex-start; }
    .choice-chip-top { display: flex; align-items: center; gap: 8px; }
    .choice-selectors {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 6px;
        min-height: 20px;
    }
    .selector-tag {
        background: #3a4166;
        color: #cdd7ff;
        border-radius: 10px;
        padding: 2px 9px;
        font-size: 12px;
        white-space: nowrap;
    }

    /* 正解時にもっと盛り上がる演出 */
    @keyframes correctPulse {
        0% { transform: scale(1); }
        35% { transform: scale(1.07); }
        100% { transform: scale(1); }
    }
    .answerer-row.correct-row {
        animation: correctPulse 0.6s ease;
        background: #17331f;
        box-shadow: 0 0 16px rgba(107, 255, 176, 0.55);
    }
    .answerer-row.incorrect-row {
        opacity: 0.8;
    }
    @keyframes bannerPop {
        0% { transform: scale(0.6); opacity: 0; }
        60% { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }
    .correct-banner {
        animation: bannerPop 0.45s ease;
        background: linear-gradient(135deg, #1f7a4d, #123b26);
        border: 1px solid #6bffb0;
        border-radius: 10px;
        padding: 12px 16px;
        margin-top: 10px;
        font-size: 17px;
        font-weight: bold;
        color: #eafff2;
    }
    .correct-banner .names {
        color: #6bffb0;
    }
    .no-correct-banner {
        background: #26315c;
        border-radius: 10px;
        padding: 12px 16px;
        margin-top: 10px;
        color: #9fb3ff;
    }

    /* みんなの夜空（開始前・フィナーレ共通） */
    #skyPanel { max-width: 900px; text-align: center; }
    .sky-panel-lead { color: #9fb3ff; margin-bottom: 4px; }

    #progressTimerDisplay:empty { display: none; }
    #skyPanel { display: none; padding: 20px; }

    /* みんなの星空（フィナーレ画面） */
    #nightSkyView {
        position: relative;
        width: 100%;
        height: 65vh;
        min-height: 380px;
        background: radial-gradient(ellipse at center, #0d1b3f 0%, #04060f 80%);
        border-radius: 14px;
        overflow: hidden;
        margin: 20px 0;
    }
    #nightSkyView .sky-star {
        position: absolute;
        color: white;
        text-shadow: 0 0 6px rgba(255,255,255,0.8);
        transform-origin: center center;
        white-space: nowrap;
    }
    #nightSkyView .filler-star {
        color: rgba(255,255,255,0.55);
        text-shadow: 0 0 3px rgba(255,255,255,0.5);
    }
    #nightSkyView .piece-line {
        color: transparent;
        text-shadow: none;
        transition: color 0.5s ease, text-shadow 0.5s ease;
    }
    #nightSkyView.lines-visible .piece-line {
        color: rgba(255, 230, 102, 0.9);
        text-shadow: 0 0 4px rgba(255, 230, 102, 0.6);
    }
    #toggleLinesBtn { background: #3a4166; }
    #toggleLinesBtn:hover { background: #2c3150; }

    /* フィナーレで流れる、完成した星・星のかけらの流れ星演出 */
    .shooting-star {
        position: absolute;
        opacity: 0;
        white-space: nowrap;
        pointer-events: none;
        animation: shootAcross 2.2s ease-in forwards;
        font-size: 20px;
        filter: drop-shadow(0 0 6px rgba(255, 224, 102, 0.8));
    }
    .shooting-star.big {
        font-size: 38px;
        filter: drop-shadow(0 0 14px rgba(255, 242, 176, 0.95));
    }
    @keyframes shootAcross {
        0% { transform: translate(0, 0) rotate(-35deg); opacity: 0; }
        8% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translate(-320px, 260px) rotate(-35deg); opacity: 0; }
    }

    /* 星が完成した時のお祝いモーダル */
    #starCelebrationOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
    }
    #starCelebrationPopup {
        background: #111a33;
        border: 1px solid #ffe066;
        border-radius: 14px;
        padding: 28px;
        max-width: 340px;
        width: 85%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #starCelebrationPopup p {
        font-size: 18px;
        color: #ffe066;
        font-weight: bold;
        line-height: 1.6;
        margin: 12px 0 20px 0;
    }
</style>
</head>
<body>

<div class="page-wrap">

<h1>伝え星（つたえぼし）</h1>
<div class="subtitle">教員用画面</div>

<!-- セッション作成フォーム -->
<div class="panel" id="setupPanel">
    <div class="field">
        <label for="genreInput">ジャンル</label>
        <select id="genreInput">
            <option value="動物">動物</option>
            <option value="食べ物">食べ物</option>
            <option value="乗り物">乗り物</option>
        </select>
    </div>
    <div class="field">
        <label for="timeLimitInput">制限時間（分）</label>
        <input type="number" id="timeLimitInput" value="10" min="1">
    </div>
    <div class="field">
        <label for="maxPiecesInput">制限パーツ数（本）</label>
        <input type="number" id="maxPiecesInput" value="30" min="1">
    </div>
    <button id="createSessionBtn">セッションを作成する</button>
</div>

<!-- セッション作成後の表示 -->
<div class="panel" id="sessionPanel">
    <div class="session-info">
        <div>
            <div id="qrcode"></div>
            <div class="join-url" id="joinUrlText"></div>
        </div>
        <div>
            <div class="session-id">セッションID：<b id="sessionIdText"></b></div>
            <div style="margin-top:16px;">
                参加者：<span id="participantCount">0</span>人
            </div>
            <ul id="participantList"></ul>
            <div class="empty-note" id="emptyNote">まだ誰も参加していません</div>
            <div class="field" style="margin-top:16px; margin-bottom:0;">
                <label for="guessOnlyNameInput">予想だけ参加する人をここから追加できます</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="guessOnlyNameInput" placeholder="なまえ" maxlength="20" style="flex:1;">
                    <button id="addGuessOnlyBtn" type="button">追加</button>
                </div>
            </div>
            <button id="startGameBtn" style="margin-top:16px;" disabled>ゲームスタート</button>
            <div style="margin-top:14px;">
                <a href="#" id="resetSessionLink" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
            </div>
        </div>
    </div>
</div>

<!-- ゲーム進行中（お題配布後）の表示 -->
<div class="panel" id="progressPanel" style="display:none;">
    <div class="subtitle" style="margin-bottom:4px;">ゲーム進行中：生徒は伝え星を制作しています</div>
    <div id="progressTimerDisplay" style="color:#ffe066; font-weight:bold; margin-bottom:12px;"></div>
    <ul id="progressList" style="list-style:none; padding:0; margin:0;"></ul>
    <button id="startPresentBtn">「伝え星」スタート</button>
    <div style="margin-top:14px;">
        <a href="#" id="resetSessionLink2" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
    </div>
</div>

<!-- 発表フェーズ -->
<div class="panel" id="presentPanel">
    <div class="present-progress" id="presentProgress"></div>
    <div class="presenter-name" id="presenterNameDisplay"></div>
    <div class="star-progress-wrap">
        <div class="star-progress-bg">★</div>
        <div class="star-progress-fill" id="starProgressFill">★</div>
    </div>
    <div class="star-gauge" id="starGaugeText"></div>
    <div id="constellationView"></div>

    <div class="present-controls" id="presentControlsMain">
        <button id="noHintCorrectBtn">🌠 ノーヒントで正解！</button>
        <button id="showChoicesBtn">🔤 ４択を出す</button>
    </div>

    <div id="quizBox" style="display:none;">
        <div id="choiceList" class="choice-list"></div>
        <div id="answererList" class="answerer-list"></div>
    </div>

    <div class="hint-answer-box" id="hintAnswerBox" style="display:none;">
        <div id="answerText"></div>
    </div>

    <div class="present-controls">
        <button id="answerBtn">✅ こたえを見る</button>
        <button id="nextBtn">次の星座へ ▶</button>
    </div>
</div>
<div class="panel" id="skyPanel" style="display:none;">
    <div id="skyPanelIntro">
        <h2 style="color:#ffe066;">🌌 まずは、みんなの夜空を見てみよう</h2>
        <p class="sky-panel-lead">みんなの星座が集まって、ひとつの夜空になりました。</p>
    </div>
    <div id="skyPanelFinished" style="display:none;">
        <h2 style="color:#ffe066;">全員の発表が終わりました！</h2>
        <p class="sky-panel-lead">おつかれさまでした。</p>
        <p id="finalStarMessage" style="font-size:20px; color:#ffe066; font-weight:bold; margin-top:16px;"></p>
        <h3 style="color:#9fb3ff; margin-top:24px; margin-bottom:0;">🌌 みんなの星空</h3>
    </div>
    <div id="nightSkyView"></div>
    <div class="present-controls" style="justify-content:center;">
        <button id="toggleLinesBtn" style="display:none;">直線を表示する</button>
        <button id="startQuizFromSkyBtn">それぞれの星座を当てていくよ ▶</button>
    </div>
</div>

<!-- 星が完成した時のお祝い表示 -->
<div id="starCelebrationOverlay">
    <div id="starCelebrationPopup">
        <div style="font-size:56px; line-height:1;">🌟</div>
        <p id="starCelebrationMessage"></p>
        <button id="starCelebrationCloseBtn">とじる</button>
    </div>
</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
        getFirestore, doc, getDoc, setDoc, collection, addDoc, onSnapshot, serverTimestamp, writeBatch
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // ▼ Firebaseプロジェクトの設定（tsutaeboshiプロジェクト）
    const firebaseConfig = {
        apiKey: "AIzaSyDKVX2XQOarobvskKYgNiWn__cDZwni7gk",
        authDomain: "tsutaeboshi.firebaseapp.com",
        projectId: "tsutaeboshi",
        storageBucket: "tsutaeboshi.firebasestorage.app",
        messagingSenderId: "797492485045",
        appId: "1:797492485045:web:1f8eca9ba07a2f0b2dd7fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ジャンルごとのお題候補（今後、必要に応じて追加・編集可能）
    // ３択ヒントで同じ頭文字の候補を出しやすいよう、頭文字が重なる単語も多めに入れてある
    // 漢字を含む単語は { text, reading } の形で読み方（ふりがな用）を持たせている
    const GENRE_THEMES = {
        "動物": ["ライオン", "ペンギン", "クマ", "キリン", "ゾウ", "パンダ", "サル", "ウサギ", "カメ", "イルカ", "キツネ", "コアラ", "カバ", "トラ", "シマウマ",
                 "アリ", "アライグマ", "イヌ", "ネコ", "ヒツジ", "ワニ", "クジラ", "サメ", "タヌキ", "ハト"],
        "食べ物": ["リンゴ", "バナナ", "ドーナツ", "ハンバーガー", "ソフトクリーム", "おにぎり", "ラーメン", "ピザ", "いちご", "すいか",
                 { text: "たこ焼き", reading: "たこやき" }, "カレー", "プリン", "パン", "すし",
                 "アイス", "あんこ", "アメ", { text: "いなり寿司", reading: "いなりずし" }, "うどん", "えびフライ", "おでん", "ぎょうざ", "ケーキ", "ゼリー", "チョコレート", "ナン", "ハンバーグ", "まんじゅう", "やきそば"],
        "乗り物": [{ text: "電車", reading: "でんしゃ" }, "ひこうき", { text: "車", reading: "くるま" }, { text: "船", reading: "ふね" }, "ロケット", "バス",
                 { text: "自転車", reading: "じてんしゃ" }, "ヘリコプター", { text: "消防車", reading: "しょうぼうしゃ" }, { text: "救急車", reading: "きゅうきゅうしゃ" },
                 "タクシー", { text: "気球", reading: "ききゅう" }, "バイク", { text: "新幹線", reading: "しんかんせん" }, "パトカー",
                 "トラック", "ヨット", "スクーター", "モノレール", "フェリー", "リムジン", "ボート", "ケーブルカー", "トロッコ", "ゴーカート"]
    };

    // GENRE_THEMES の要素（文字列 or {text,reading}）から表示用のプレーンな文字列を取り出す
    function themeText(entry){
        return typeof entry === "string" ? entry : entry.text;
    }

    // 漢字を含む単語の読み方を引けるように、あらかじめ辞書化しておく（ふりがな表示用）
    const THEME_READINGS = {};
    Object.values(GENRE_THEMES).forEach(list => {
        list.forEach(entry => {
            if(typeof entry !== "string" && entry.reading){
                THEME_READINGS[entry.text] = entry.reading;
            }
        });
    });

    function escapeHtml(str){
        return String(str).replace(/[&<>"']/g, ch => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[ch]));
    }

    // カタカナをひらがなに変換する（テキストと読みの位置合わせに使う）
    function kataToHira(str){
        return str.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    // text（例:「たこ焼き」）と reading（例:「たこやき」）を比較し、
    // 前後のひらがな・カタカナが一致する部分を除いた「漢字部分」とその読みを取り出す
    function splitKanjiRun(text, reading){
        const normText = kataToHira(text);
        let prefixLen = 0;
        while(prefixLen < normText.length && prefixLen < reading.length &&
              normText[prefixLen] === reading[prefixLen]){
            prefixLen++;
        }
        let suffixLen = 0;
        while(suffixLen < normText.length - prefixLen && suffixLen < reading.length - prefixLen &&
              normText[normText.length - 1 - suffixLen] === reading[reading.length - 1 - suffixLen]){
            suffixLen++;
        }
        return {
            prefix: text.slice(0, prefixLen),
            kanji: text.slice(prefixLen, text.length - suffixLen),
            kanjiReading: reading.slice(prefixLen, reading.length - suffixLen),
            suffix: text.slice(text.length - suffixLen)
        };
    }

    // お題の単語部分（座を付ける前）をふりがな付きHTMLに変換する。漢字を含まない場合はそのままの文字列。
    function buildFuriganaHtml(text){
        const reading = THEME_READINGS[text];
        if(!reading) return escapeHtml(text);
        const { prefix, kanji, kanjiReading, suffix } = splitKanjiRun(text, reading);
        if(!kanji) return escapeHtml(text);
        return `${escapeHtml(prefix)}<ruby>${escapeHtml(kanji)}<rt>${escapeHtml(kanjiReading)}</rt></ruby>${escapeHtml(suffix)}`;
    }

    // お題名を「〇〇 座」の形で、座には小さめのふりがな「ざ」を付けて表示するHTMLを組み立てる
    function renderConstellationNameHtml(text){
        return `${buildFuriganaHtml(text)}<span class="za-suffix"> <ruby>座<rt>ざ</rt></ruby></span>`;
    }

    // 生徒が「あと１分待って」を選ぶと timeLimitSec が延長されるので、
    // ここで残り時間の表示も自動的に更新される
    function updateProgressTimerDisplay(){
        const timerEl = document.getElementById("progressTimerDisplay");
        if(!timerEl) return;
        if(progressCountdownInterval){
            clearInterval(progressCountdownInterval);
            progressCountdownInterval = null;
        }
        if(!sessionTimeLimitSec || !sessionStartedAtMillis){
            timerEl.textContent = "";
            return;
        }
        function tick(){
            const elapsed = (Date.now() - sessionStartedAtMillis) / 1000;
            const remaining = Math.max(0, Math.round(sessionTimeLimitSec - elapsed));
            const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
            const ss = String(remaining % 60).padStart(2, "0");
            timerEl.textContent = `残り時間 ${mm}:${ss}`;
            timerEl.style.color = remaining <= 0 ? "#ff4d4d" : "#ffe066";
        }
        tick();
        progressCountdownInterval = setInterval(tick, 1000);
    }

    // 配列をランダムな順序に並べ替える（Fisher-Yatesシャッフル）
    function shuffle(array){
        const arr = [...array];
        for(let i = arr.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

            // 「予想だけ参加」の人には星座のお題を割り当てない
            const drawingParticipants = currentParticipants.filter(p => !p.guessOnly);
            const sessionSnapForThemes = GENRE_THEMES[document.getElementById("genreInput").value] || [];
            let themePool = shuffle(sessionSnapForThemes);
            const assignments = drawingParticipants.map((p, i) => {
                if(i > 0 && i % themePool.length === 0){
                    themePool = shuffle(sessionSnapForThemes); // 一周したら再シャッフルして続ける
                }
                return { participantId: p.id, theme: themeText(themePool[i % themePool.length]) };
            });

            const batch = writeBatch(db);
            assignments.forEach(a => {
                const pRef = doc(db, "sessions", currentSessionId, "participants", a.participantId);
                batch.update(pRef, { theme: a.theme });
            });
            const sessionRef = doc(db, "sessions", currentSessionId);
            batch.update(sessionRef, { status: "creating", startedAt: serverTimestamp() });
            await batch.commit();

            sessionPanel.style.display = "none";
            progressPanel.style.display = "block";

    // 星のかけら（正解した人数などに応じて集まる）。星座ごとにリセットせず、発表フェーズ全体で累積する
    let starFragments = 0;
    let completedStars = 0;
    const MIN_FRAGMENTS_PER_STAR = 3; // 予想する人数が少ない時でも簡単になりすぎないよう最低ライン

    // 星１個の完成に必要なかけら数は固定ではなく、「提出された星座の数」と「毎回の予想人数」に応じて変える
    // （出題者以外の全員＝毎回の予想人数。予想だけ参加の人も含む）
    function getGuesserCount(){
        if(!currentPresentedParticipant) return Math.max(0, currentParticipants.length - 1);
        return currentParticipants.filter(p => p.id !== currentPresentedParticipant.id).length;
    }
    // 「通常の最大」＝ 提出星座の数 × 毎回の予想人数（＝４択で全員が正解した場合に得られるかけらの総数）
    function getNormalMaxFragments(){
        return presentationQueue.length * getGuesserCount();
    }
    // 星１個に必要なかけら数は、「通常の最大」の半分を基準にする
    // （ノーヒント正解のボーナスがあるため、実際にはこれを超えて集まることもある）
    function getFragmentsPerStar(){
        return Math.max(MIN_FRAGMENTS_PER_STAR, Math.round(getNormalMaxFragments() / 2));
    }

    // 参加者の提出データ（piecesData・canvasWidth/Height）を、教員画面のビュー枠に縮尺を合わせて描画する
    function renderConstellation(participant){
        constellationView.innerHTML = "";
        const pieces = participant.piecesData || [];
        const srcW = participant.canvasWidth || 375;
        const srcH = participant.canvasHeight || 600;
        const rect = constellationView.getBoundingClientRect();
        const scale = Math.min(rect.width / srcW, rect.height / srcH);
        const offsetX = (rect.width - srcW * scale) / 2;
        const offsetY = (rect.height - srcH * scale) / 2;

        pieces.forEach(p => {
            const span = document.createElement("div");
            span.className = "piece";
            span.textContent = labelForPresent(p.type);
            span.style.left = (offsetX + p.x * scale) + "px";
            span.style.top = (offsetY + p.y * scale) + "px";
            span.style.fontSize = (22 * scale) + "px";
            span.style.transform = `rotate(${p.angle}deg)`;
            constellationView.appendChild(span);
        });
    }

    function labelForPresent(type){
        if(type === 'star') return "●";
        if(type === 'short') return "●──●";
        if(type === 'mid') return "●────●";
        if(type === 'long') return "●────────●";
        return "";
    }

    function imageSearchUrl(word){

    // 星のかけらを加算し、しきい値を超えたら「きれいな星」完成のお祝いを出す
    function addFragments(n){
        if(n <= 0) return;
        starFragments += n;
        const perStar = getFragmentsPerStar();
        const newCompleted = Math.floor(starFragments / perStar);
        if(newCompleted > completedStars){
            completedStars = newCompleted;
            showStarCelebration(completedStars);
        }
        updateStarGaugeDisplay();
    }

    function updateStarGaugeDisplay(){
        const perStar = getFragmentsPerStar();
        const inCurrent = starFragments % perStar;
        starGaugeText.textContent = `✨ 星のかけら ${inCurrent} / ${perStar}　（きれいな星：${completedStars}個）`;

        const pct = perStar > 0 ? Math.min(100, Math.round((inCurrent / perStar) * 100)) : 0;
        if(starProgressFill){
            starProgressFill.style.clipPath = `inset(${100 - pct}% 0 0 0)`;
        }
    }

    function getStarCelebrationText(count){
        if(count === 1) return "きれいな星が完成！\nおめでとう！";
        if(count === 2) return "きれいな星が２個できた！\nさらにおめでとう！";
        if(count === 3) return "きれいな星が３個できた！\nさらにさらにおめでとう！";
        return `きれいな星が${count}個できた！\nみんなの力の結晶だね、すごい！`;
    }

    function showStarCelebration(count){
        starCelebrationMessage.textContent = getStarCelebrationText(count);
        starCelebrationOverlay.style.display = "flex";
    }

        starCelebrationOverlay.style.display = "none";
    });

    // 発表が全部終わった時の、完成した星の数に応じた前向きなメッセージ
    function getFinalStarMessage(){
        if(completedStars <= 0 && starFragments <= 0){
            return "みんなの発表、おつかれさまでした！次はどんな星が完成するか楽しみだね。";
        } else if(completedStars === 0){
            return `星のかけらが${starFragments}個集まりました！あと少しで星が完成しそうだね。`;
        } else if(completedStars === 1){
            return "きれいな星が１個完成しました！おめでとう！みんなよくがんばったね。";
        } else if(completedStars === 2){
            return "きれいな星が２個も完成しました！さらにおめでとう！最高のチームワークだったね。";
        } else {
            return `きれいな星が${completedStars}個も完成しました！さらにさらにおめでとう！みんなの力の結晶だね、すごい！`;
        }
    }

    // お題と同じジャンルの中から、頭文字が一致する候補を優先して４択（正解＋３つ）を作る
    function buildChoiceOptions(participant){
        const theme = participant.theme || "";
        const pool = (GENRE_THEMES[currentSessionGenre] || []).map(themeText).filter(w => w !== theme);
        const targetFirst = normalizedFirstChar(theme);
        const sameFirstPool = shuffle(pool.filter(w => normalizedFirstChar(w) === targetFirst));

        const distractors = sameFirstPool.slice(0, 3);
        if(distractors.length < 3){
            const rest = shuffle(pool.filter(w => !distractors.includes(w)));
            while(distractors.length < 3 && rest.length > 0){
                distractors.push(rest.pop());
            }
        }
        return shuffle([theme, ...distractors]);
    }

    const CHOICE_LABELS = ["①", "②", "③", "④"];

    function renderChoiceList(){
        choiceList.innerHTML = "";
        currentChoices.forEach((word, i) => {
            const chip = document.createElement("div");
            chip.className = "choice-chip";
            chip.dataset.idx = i;

            const top = document.createElement("div");
            top.className = "choice-chip-top";

            const labelSpan = document.createElement("span");
            labelSpan.className = "choice-label";
            labelSpan.textContent = CHOICE_LABELS[i] || "";
            top.appendChild(labelSpan);

            const wordSpan = document.createElement("span");
            wordSpan.innerHTML = buildFuriganaHtml(word);
            top.appendChild(wordSpan);

            const link = document.createElement("a");
            link.href = imageSearchUrl(word);
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = "🔍 画像検索";
            top.appendChild(link);

            chip.appendChild(top);

            const selectors = document.createElement("div");
            selectors.className = "choice-selectors";
            chip.appendChild(selectors);

            choiceList.appendChild(chip);
        });
        updateChoiceAssignments();
    }

    // 今、誰がどの選択肢を選んでいるかを、選択肢チップの下に名前タグとして表示する
    function updateChoiceAssignments(){
        const chips = choiceList.querySelectorAll(".choice-chip");
        chips.forEach(chip => {
            const idx = Number(chip.dataset.idx);
            const selectors = chip.querySelector(".choice-selectors");
            selectors.innerHTML = "";
            currentParticipants.forEach(p => {
                if(p.id === currentPresentedParticipant.id) return;
                if(answererSelections[p.id] === idx){
                    const tag = document.createElement("span");
                    tag.className = "selector-tag";
                    tag.textContent = p.name || "（名前未設定）";
                    selectors.appendChild(tag);
                }
            });
        });
    }

    function renderAnswererRows(){
        answererList.innerHTML = "";
        const others = currentParticipants.filter(p => p.id !== currentPresentedParticipant.id);

        if(others.length === 0){
            const note = document.createElement("div");
            note.style.color = "#9fb3ff";
            note.textContent = "（他の参加者がいません）";
            answererList.appendChild(note);
            return;
        }

        others.forEach(p => {
            const row = document.createElement("div");
            row.className = "answerer-row";
            row.dataset.participantId = p.id;

            const nameSpan = document.createElement("span");
            nameSpan.className = "answerer-name";
            nameSpan.textContent = p.name || "（名前未設定）";
            row.appendChild(nameSpan);

            currentChoices.forEach((word, i) => {
                const btn = document.createElement("button");
                btn.className = "answerer-choice-btn";
                btn.textContent = CHOICE_LABELS[i] || "";
                btn.dataset.idx = i;
                btn.addEventListener("click", () => {
                    if(quizRevealed) return;
                    answererSelections[p.id] = i;
                    row.querySelectorAll(".answerer-choice-btn").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                    updateChoiceAssignments();
                });
                row.appendChild(btn);
            });

            const resultIcon = document.createElement("span");
            resultIcon.className = "answerer-result-icon";
            row.appendChild(resultIcon);

            answererList.appendChild(row);
        });
    }

    // 正解発表の共通部分（お題名をふりがな付きで表示し、画像検索リンクを付ける）
    function revealAnswerCore(){
        const theme = currentPresentedParticipant.theme || "";

        answerText.innerHTML = "";
        const textSpan = document.createElement("span");
        textSpan.innerHTML = `${escapeHtml(currentPresentedParticipant.name)}さん作「${renderConstellationNameHtml(theme)}」でした！　`;
        answerText.appendChild(textSpan);

        const link = document.createElement("a");
        link.href = imageSearchUrl(theme);
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.style.color = "#9fb3ff";
        link.style.fontSize = "14px";
        link.textContent = "🔍 画像検索";
        answerText.appendChild(link);

        hintAnswerBox.style.display = "block";
    }

    noHintCorrectBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        revealAnswerCore();
        // ヒントなし正解のボーナスは「今回の予想人数」分＝星が１個まるまる完成する量にする
        const bonus = getFragmentsPerStar();
        addFragments(bonus);

        const bonusNote = document.createElement("div");
        bonusNote.style.marginTop = "10px";
        bonusNote.style.color = "#c9a6ff";
        bonusNote.style.fontWeight = "bold";
        bonusNote.textContent = `🌠 ヒントなしで大正解！ 星のかけら +${bonus}！`;
        answerText.parentElement.appendChild(bonusNote);

        presentControlsMain.style.display = "none";
        answerBtn.style.display = "none";
    });

    showChoicesBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        currentChoices = buildChoiceOptions(currentPresentedParticipant);
        correctChoiceIndex = currentChoices.indexOf(currentPresentedParticipant.theme);
        answererSelections = {};
        quizRevealed = false;

        renderChoiceList();
        renderAnswererRows();
        quizBox.style.display = "block";
        presentControlsMain.style.display = "none";
    });

    answerBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        revealAnswerCore();

        if(quizBox.style.display === "block" && !quizRevealed){
            quizRevealed = true;
            let correctCount = 0;
            const correctNames = [];

            answererList.querySelectorAll(".answerer-row").forEach(row => {
                const pid = row.dataset.participantId;
                const sel = answererSelections[pid];
                const icon = row.querySelector(".answerer-result-icon");
                const participant = currentParticipants.find(p => p.id === pid);

                row.querySelectorAll(".answerer-choice-btn").forEach((b, i) => {
                    b.disabled = true;
                    if(i === correctChoiceIndex) b.classList.add("correct");
                    else if(i === sel) b.classList.add("incorrect");
                });

                if(sel === correctChoiceIndex){
                    correctCount++;
                    correctNames.push(participant ? (participant.name || "（名前未設定）") : "？");
                    icon.textContent = "○";
                    icon.style.color = "#6bffb0";
                    row.classList.add("correct-row");
                } else if(sel !== undefined){
                    icon.textContent = "×";
                    icon.style.color = "#ff8a8a";
                    row.classList.add("incorrect-row");
                } else {
                    icon.textContent = "－";
                    icon.style.color = "#9fb3ff";
                    row.classList.add("incorrect-row");
                }
            });

            if(correctCount > 0) addFragments(correctCount);

            const banner = document.createElement("div");
            if(correctCount > 0){
                banner.className = "correct-banner";
                banner.innerHTML = `🎉🌟 大正解！　<span class="names">${correctNames.map(escapeHtml).join("、")}</span> さん、正解！　星のかけら +${correctCount}`;
            } else {
                banner.className = "no-correct-banner";
                banner.textContent = "今回は正解者なし。次はきっと当たるよ！";
            }
            answererList.appendChild(banner);
        }

        answerBtn.style.display = "none";
    });

    nextBtn.addEventListener("click", showNextConstellation);

    // ===== みんなの星空（フィナーレ画面） =====
    let nightSkyLinesVisible = false;

    // ピース種別ごとの、線を含めたおおよその長さ（バウンディングボックス計算用の概算値）
    function pieceApproxLength(type){
        if(type === 'short') return 40;
        if(type === 'mid') return 80;
        if(type === 'long') return 160;
        return 0;
    }

    // 直線の色をtransparentにしておき、表示ON/OFFで色だけ切り替える。
    // display切替ではなく色の切替にすることで、線を消しても星の位置（間隔）がズレないようにしている。
    function buildSkyPieceElement(piece, fontSize){
        const wrapper = document.createElement("span");
        wrapper.className = "sky-star";
        wrapper.style.fontSize = fontSize + "px";
        wrapper.style.transform = `rotate(${piece.angle || 0}deg)`;

        if(piece.type === 'star'){
            const dot = document.createElement("span");
            dot.textContent = "●";
            wrapper.appendChild(dot);
        } else {
            const dashCounts = { short: 2, mid: 4, long: 8 };
            const dashCount = dashCounts[piece.type] || 2;
            const startDot = document.createElement("span");
            startDot.textContent = "●";
            const line = document.createElement("span");
            line.className = "piece-line";
            line.textContent = "─".repeat(dashCount);
            const endDot = document.createElement("span");
            endDot.textContent = "●";
            wrapper.appendChild(startDot);
            wrapper.appendChild(line);
            wrapper.appendChild(endDot);
        }
        return wrapper;
    }

    // 参加者全員の星座を、バラバラな位置に散らして１つの夜空にまとめて描画する
    function renderNightSky(){
        nightSkyView.innerHTML = "";
        nightSkyView.classList.remove("lines-visible");
        nightSkyLinesVisible = false;
        toggleLinesBtn.textContent = "直線を表示する";

        const rect = nightSkyView.getBoundingClientRect();
        const W = rect.width;
        const H = rect.height;
        if(!W || !H) return;

        const FONT_SIZE = 20;
        const CLUSTER_SCALE = 0.55; // 制作時のキャンバスに対する縮小率
        let totalDots = 0;

        currentParticipants.forEach(participant => {
            const pieces = participant.piecesData || [];
            if(pieces.length === 0) return;

            // 線の長さも考慮した、このお子さんの星座のバウンディングボックスを求める
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            pieces.forEach(pc => {
                const len = pieceApproxLength(pc.type);
                minX = Math.min(minX, pc.x - len);
                maxX = Math.max(maxX, pc.x + len);
                minY = Math.min(minY, pc.y - len);
                maxY = Math.max(maxY, pc.y + len);
            });
            if(!isFinite(minX)) return;

            const bboxW = (maxX - minX) * CLUSTER_SCALE;
            const bboxH = (maxY - minY) * CLUSTER_SCALE;
            const marginX = Math.min(bboxW / 2, W / 2 - 10);
            const marginY = Math.min(bboxH / 2, H / 2 - 10);
            const cx = marginX + Math.random() * Math.max(1, W - marginX * 2);
            const cy = marginY + Math.random() * Math.max(1, H - marginY * 2);
            const originCenterX = (minX + maxX) / 2;
            const originCenterY = (minY + maxY) / 2;

            pieces.forEach(pc => {
                const el = buildSkyPieceElement(pc, FONT_SIZE * CLUSTER_SCALE);
                el.style.left = (cx + (pc.x - originCenterX) * CLUSTER_SCALE) + "px";
                el.style.top = (cy + (pc.y - originCenterY) * CLUSTER_SCALE) + "px";
                nightSkyView.appendChild(el);
                totalDots += (pc.type === 'star') ? 1 : 2;
            });
        });

        // 星が少ない時は、ランダムな飾りの星を足してリアルな夜空に近づける
        const TARGET_MIN_STARS = 90;
        const fillerCount = Math.min(150, Math.max(0, TARGET_MIN_STARS - totalDots));
        for(let i = 0; i < fillerCount; i++){
            const dot = document.createElement("span");
            dot.className = "sky-star filler-star";
            dot.textContent = "●";
            dot.style.position = "absolute";
            dot.style.left = (Math.random() * W) + "px";
            dot.style.top = (Math.random() * H) + "px";
            dot.style.fontSize = (6 + Math.random() * 10) + "px";
            nightSkyView.appendChild(dot);
        }
    }

    toggleLinesBtn.addEventListener("click", () => {
        nightSkyLinesVisible = !nightSkyLinesVisible;
        nightSkyView.classList.toggle("lines-visible", nightSkyLinesVisible);
        toggleLinesBtn.textContent = nightSkyLinesVisible ? "直線を消す" : "直線を表示する";
    });

    // フィナーレの夜空に、完成した大きな星と集めた星のかけらを、流れ星のように次々流す
    // bigCount: 完成した「きれいな星」の数／smallCount: 集めた星のかけらの総数（１個ずつすべて表示する）
    function addShootingStars(container, bigCount, smallCount){
        const rect = container.getBoundingClientRect();
        const W = rect.width || 600;
        const H = rect.height || 400;
        let delay = 400;

        function spawn(isBig, extraDelay){
            const el = document.createElement("div");
            el.className = "shooting-star" + (isBig ? " big" : "");
            el.textContent = isBig ? "🌟" : "🌠";
            el.style.left = (W * (0.35 + Math.random() * 0.5)) + "px";
            el.style.top = (H * (Math.random() * 0.35)) + "px";
            el.style.animationDelay = extraDelay + "ms";
            container.appendChild(el);
            // アニメーション終了後は要素を片付ける
            setTimeout(() => { if(el.parentNode) el.parentNode.removeChild(el); }, extraDelay + 2600);
        }

        for(let i = 0; i < bigCount; i++){
            spawn(true, delay);
            delay += 750;
        }
        for(let i = 0; i < smallCount; i++){
            spawn(false, delay);
            delay += 260;
        }
    }
</script>
