<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伝え星（つたえぼし） - 教員用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: "Hiragino Sans", "Meiryo", sans-serif;
        background: #0b1020;
        color: white;
        min-height: 100vh;
        padding: 24px;
    }
    .page-wrap {
        max-width: 900px;
        margin: 0 auto;
    }
    h1 {
        margin: 0 0 4px 0;
        font-size: 28px;
        color: #ffe066;
    }
    .subtitle {
        color: #9fb3ff;
        margin-bottom: 24px;
    }
    .panel {
        background: #111a33;
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 20px;
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
    }
    label {
        display: block;
        margin-bottom: 6px;
        color: #9fb3ff;
        font-size: 14px;
    }
    .field {
        margin-bottom: 16px;
    }
    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #1c2a55;
        color: white;
        font-size: 16px;
    }
    button {
        background: #2b4cff;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover { background: #1a35cc; }
    button:disabled { background: #3a4166; cursor: not-allowed; }

    #sessionPanel { display: none; }
    .session-info {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        align-items: flex-start;
    }
    #qrcode {
        background: white;
        padding: 12px;
        border-radius: 8px;
        display: inline-block;
    }
    .join-url {
        margin-top: 10px;
        font-size: 13px;
        color: #9fb3ff;
        word-break: break-all;
        max-width: 260px;
    }
    .session-id {
        font-size: 14px;
        color: #9fb3ff;
    }
    .session-id b {
        color: #ffe066;
        font-size: 20px;
        letter-spacing: 2px;
    }
    #participantList {
        list-style: none;
        padding: 0;
        margin: 12px 0 0 0;
        min-width: 220px;
    }
    #participantList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
    }
    #participantCount {
        color: #ffe066;
        font-weight: bold;
    }
    .empty-note {
        color: #6a76a8;
        font-size: 14px;
    }
    #progressList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
        display: flex;
        justify-content: space-between;
    }
    .status-submitted { color: #6bffb0; }
    .status-pending { color: #ffb066; }

    #startPresentBtn { margin-top: 16px; display: none; }

    #presentPanel {
        display: none;
        max-width: 900px;
    }
    .present-progress {
        color: #9fb3ff;
        font-size: 14px;
        margin-bottom: 10px;
    }
    #constellationView {
        position: relative;
        height: 55vh;
        background: radial-gradient(circle at center, #0b1a3a, #050814);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    #constellationView .piece {
        position: absolute;
        color: white;
        font-size: 22px;
        text-shadow: 0 0 6px rgba(255,255,255,0.7);
        transform-origin: center center;
        white-space: nowrap;
    }
    .present-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }
    .hint-answer-box {
        background: #1c2a55;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 16px;
        min-height: 24px;
        font-size: 18px;
    }
    #answerText { color: #6bffb0; font-weight: bold; }
    .za-suffix { font-size: 0.82em; }
    ruby rt {
        font-size: 0.55em;
        color: #cdd7ff;
    }

    /* 星のかけらゲージ */
    .star-gauge {
        color: #ffe066;
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 10px;
    }

    /* ４択の一覧（正解＋３つ、画像検索リンク付き） */
    .choice-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
    }
    .choice-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #26315c;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 16px;
    }
    .choice-chip .choice-label {
        color: #ffe066;
        font-weight: bold;
    }
    .choice-chip a {
        color: #9fb3ff;
        font-size: 13px;
        text-decoration: none;
        border-bottom: 1px dotted #9fb3ff;
    }
    .choice-chip a:hover { color: #ffe066; }

    /* 出題者以外、一人ずつの回答欄 */
    .answerer-list { margin-bottom: 10px; }
    .answerer-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        background: #161f3d;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
    }
    .answerer-name {
        min-width: 84px;
        font-weight: bold;
        color: white;
    }
    .answerer-choice-btn {
        background: #26315c;
        border: 2px solid transparent;
        border-radius: 6px;
        padding: 6px 12px;
        color: white;
        cursor: pointer;
        font-size: 15px;
    }
    .answerer-choice-btn.selected {
        border-color: #ffe066;
        background: #3a4166;
    }
    .answerer-choice-btn.correct {
        background: #1f7a4d;
        border-color: #6bffb0;
    }
    .answerer-choice-btn.incorrect {
        background: #7a2020;
        border-color: #ff8a8a;
        opacity: 0.75;
    }
    .answerer-result-icon {
        font-size: 20px;
        font-weight: bold;
        min-width: 24px;
        text-align: center;
    }
    #noHintCorrectBtn { background: #7a4fc7; }
    #noHintCorrectBtn:hover { background: #603c9e; }

    #progressTimerDisplay:empty { display: none; }
    #presentFinished {
        display: none;
        text-align: center;
        padding: 20px;
    }

    /* 星が完成した時のお祝いモーダル */
    #starCelebrationOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
    }
    #starCelebrationPopup {
        background: #111a33;
        border: 1px solid #ffe066;
        border-radius: 14px;
        padding: 28px;
        max-width: 340px;
        width: 85%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    #starCelebrationPopup p {
        font-size: 18px;
        color: #ffe066;
        font-weight: bold;
        line-height: 1.6;
        margin: 12px 0 20px 0;
    }
</style>
</head>
<body>

<div class="page-wrap">

<h1>伝え星（つたえぼし）</h1>
<div class="subtitle">教員用画面</div>

<!-- セッション作成フォーム -->
<div class="panel" id="setupPanel">
    <div class="field">
        <label for="genreInput">ジャンル</label>
        <select id="genreInput">
            <option value="動物">動物</option>
            <option value="食べ物">食べ物</option>
            <option value="乗り物">乗り物</option>
        </select>
    </div>
    <div class="field">
        <label for="timeLimitInput">制限時間（分）</label>
        <input type="number" id="timeLimitInput" value="10" min="1">
    </div>
    <div class="field">
        <label for="maxPiecesInput">制限パーツ数（本）</label>
        <input type="number" id="maxPiecesInput" value="30" min="1">
    </div>
    <button id="createSessionBtn">セッションを作成する</button>
</div>

<!-- セッション作成後の表示 -->
<div class="panel" id="sessionPanel">
    <div class="session-info">
        <div>
            <div id="qrcode"></div>
            <div class="join-url" id="joinUrlText"></div>
        </div>
        <div>
            <div class="session-id">セッションID：<b id="sessionIdText"></b></div>
            <div style="margin-top:16px;">
                参加者：<span id="participantCount">0</span>人
            </div>
            <ul id="participantList"></ul>
            <div class="empty-note" id="emptyNote">まだ誰も参加していません</div>
            <button id="startGameBtn" style="margin-top:16px;" disabled>ゲームスタート</button>
            <div style="margin-top:14px;">
                <a href="#" id="resetSessionLink" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
            </div>
        </div>
    </div>
</div>

<!-- ゲーム進行中（お題配布後）の表示 -->
<div class="panel" id="progressPanel" style="display:none;">
    <div class="subtitle" style="margin-bottom:4px;">ゲーム進行中：生徒は伝え星を制作しています</div>
    <div id="progressTimerDisplay" style="color:#ffe066; font-weight:bold; margin-bottom:12px;"></div>
    <ul id="progressList" style="list-style:none; padding:0; margin:0;"></ul>
    <button id="startPresentBtn">「伝え星」スタート</button>
    <div style="margin-top:14px;">
        <a href="#" id="resetSessionLink2" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
    </div>
</div>

<!-- 発表フェーズ -->
<div class="panel" id="presentPanel">
    <div class="present-progress" id="presentProgress"></div>
    <div class="star-gauge" id="starGaugeText"></div>
    <div id="constellationView"></div>

    <div class="present-controls" id="presentControlsMain">
        <button id="noHintCorrectBtn">🌠 ノーヒントで正解！</button>
        <button id="showChoicesBtn">🔤 ４択を出す</button>
    </div>

    <div id="quizBox" style="display:none;">
        <div id="choiceList" class="choice-list"></div>
        <div id="answererList" class="answerer-list"></div>
    </div>

    <div class="hint-answer-box" id="hintAnswerBox" style="display:none;">
        <div id="answerText"></div>
    </div>

    <div class="present-controls">
        <button id="answerBtn">✅ こたえを見る</button>
        <button id="nextBtn">次の星座へ ▶</button>
    </div>
</div>
<div class="panel" id="presentFinished">
    <h2 style="color:#ffe066;">全員の発表が終わりました！</h2>
    <p class="subtitle">おつかれさまでした。</p>
    <p id="finalStarMessage" style="font-size:20px; color:#ffe066; font-weight:bold; margin-top:16px;"></p>
</div>

<!-- 星が完成した時のお祝い表示 -->
<div id="starCelebrationOverlay">
    <div id="starCelebrationPopup">
        <div style="font-size:56px; line-height:1;">🌟</div>
        <p id="starCelebrationMessage"></p>
        <button id="starCelebrationCloseBtn">とじる</button>
    </div>
</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
        getFirestore, doc, getDoc, setDoc, collection, onSnapshot, serverTimestamp, writeBatch
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // ▼ Firebaseプロジェクトの設定（tsutaeboshiプロジェクト）
    const firebaseConfig = {
        apiKey: "AIzaSyDKVX2XQOarobvskKYgNiWn__cDZwni7gk",
        authDomain: "tsutaeboshi.firebaseapp.com",
        projectId: "tsutaeboshi",
        storageBucket: "tsutaeboshi.firebasestorage.app",
        messagingSenderId: "797492485045",
        appId: "1:797492485045:web:1f8eca9ba07a2f0b2dd7fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ジャンルごとのお題候補（今後、必要に応じて追加・編集可能）
    // ３択ヒントで同じ頭文字の候補を出しやすいよう、頭文字が重なる単語も多めに入れてある
    // 漢字を含む単語は { text, reading } の形で読み方（ふりがな用）を持たせている
    const GENRE_THEMES = {
        "動物": ["ライオン", "ペンギン", "クマ", "キリン", "ゾウ", "パンダ", "サル", "ウサギ", "カメ", "イルカ", "キツネ", "コアラ", "カバ", "トラ", "シマウマ",
                 "アリ", "アライグマ", "イヌ", "ネコ", "ヒツジ", "ワニ", "クジラ", "サメ", "タヌキ", "ハト"],
        "食べ物": ["リンゴ", "バナナ", "ドーナツ", "ハンバーガー", "ソフトクリーム", "おにぎり", "ラーメン", "ピザ", "いちご", "すいか",
                 { text: "たこ焼き", reading: "たこやき" }, "カレー", "プリン", "パン", "すし",
                 "アイス", "あんこ", "アメ", { text: "いなり寿司", reading: "いなりずし" }, "うどん", "えびフライ", "おでん", "ぎょうざ", "ケーキ", "ゼリー", "チョコレート", "ナン", "ハンバーグ", "まんじゅう", "やきそば"],
        "乗り物": [{ text: "電車", reading: "でんしゃ" }, "ひこうき", { text: "車", reading: "くるま" }, { text: "船", reading: "ふね" }, "ロケット", "バス",
                 { text: "自転車", reading: "じてんしゃ" }, "ヘリコプター", { text: "消防車", reading: "しょうぼうしゃ" }, { text: "救急車", reading: "きゅうきゅうしゃ" },
                 "タクシー", { text: "気球", reading: "ききゅう" }, "バイク", { text: "新幹線", reading: "しんかんせん" }, "パトカー",
                 "トラック", "ヨット", "スクーター", "モノレール", "フェリー", "リムジン", "ボート", "ケーブルカー", "トロッコ", "ゴーカート"]
    };

    // GENRE_THEMES の要素（文字列 or {text,reading}）から表示用のプレーンな文字列を取り出す
    function themeText(entry){
        return typeof entry === "string" ? entry : entry.text;
    }

    // 漢字を含む単語の読み方を引けるように、あらかじめ辞書化しておく（ふりがな表示用）
    const THEME_READINGS = {};
    Object.values(GENRE_THEMES).forEach(list => {
        list.forEach(entry => {
            if(typeof entry !== "string" && entry.reading){
                THEME_READINGS[entry.text] = entry.reading;
            }
        });
    });

    function escapeHtml(str){
        return String(str).replace(/[&<>"']/g, ch => ({
            "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
        }[ch]));
    }

    // カタカナをひらがなに変換する（テキストと読みの位置合わせに使う）
    function kataToHira(str){
        return str.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    // text（例:「たこ焼き」）と reading（例:「たこやき」）を比較し、
    // 前後のひらがな・カタカナが一致する部分を除いた「漢字部分」とその読みを取り出す
    function splitKanjiRun(text, reading){
        const normText = kataToHira(text);
        let prefixLen = 0;
        while(prefixLen < normText.length && prefixLen < reading.length &&
              normText[prefixLen] === reading[prefixLen]){
            prefixLen++;
        }
        let suffixLen = 0;
        while(suffixLen < normText.length - prefixLen && suffixLen < reading.length - prefixLen &&
              normText[normText.length - 1 - suffixLen] === reading[reading.length - 1 - suffixLen]){
            suffixLen++;
        }
        return {
            prefix: text.slice(0, prefixLen),
            kanji: text.slice(prefixLen, text.length - suffixLen),
            kanjiReading: reading.slice(prefixLen, reading.length - suffixLen),
            suffix: text.slice(text.length - suffixLen)
        };
    }

    // お題の単語部分（座を付ける前）をふりがな付きHTMLに変換する。漢字を含まない場合はそのままの文字列。
    function buildFuriganaHtml(text){
        const reading = THEME_READINGS[text];
        if(!reading) return escapeHtml(text);
        const { prefix, kanji, kanjiReading, suffix } = splitKanjiRun(text, reading);
        if(!kanji) return escapeHtml(text);
        return `${escapeHtml(prefix)}<ruby>${escapeHtml(kanji)}<rt>${escapeHtml(kanjiReading)}</rt></ruby>${escapeHtml(suffix)}`;
    }

    // お題名を「〇〇 座」の形で、座には小さめのふりがな「ざ」を付けて表示するHTMLを組み立てる
    function renderConstellationNameHtml(text){
        return `${buildFuriganaHtml(text)}<span class="za-suffix"> <ruby>座<rt>ざ</rt></ruby></span>`;
    }

    const setupPanel = document.getElementById("setupPanel");
    const sessionPanel = document.getElementById("sessionPanel");
    const progressPanel = document.getElementById("progressPanel");
    const progressList = document.getElementById("progressList");
    const startPresentBtn = document.getElementById("startPresentBtn");
    const presentPanel = document.getElementById("presentPanel");
    const presentFinished = document.getElementById("presentFinished");
    const presentProgress = document.getElementById("presentProgress");
    const starGaugeText = document.getElementById("starGaugeText");
    const constellationView = document.getElementById("constellationView");
    const hintAnswerBox = document.getElementById("hintAnswerBox");
    const answerText = document.getElementById("answerText");
    const presentControlsMain = document.getElementById("presentControlsMain");
    const noHintCorrectBtn = document.getElementById("noHintCorrectBtn");
    const showChoicesBtn = document.getElementById("showChoicesBtn");
    const quizBox = document.getElementById("quizBox");
    const choiceList = document.getElementById("choiceList");
    const answererList = document.getElementById("answererList");
    const answerBtn = document.getElementById("answerBtn");
    const nextBtn = document.getElementById("nextBtn");
    const starCelebrationOverlay = document.getElementById("starCelebrationOverlay");
    const starCelebrationMessage = document.getElementById("starCelebrationMessage");
    const starCelebrationCloseBtn = document.getElementById("starCelebrationCloseBtn");
    const createSessionBtn = document.getElementById("createSessionBtn");
    const startGameBtn = document.getElementById("startGameBtn");
    const participantList = document.getElementById("participantList");
    const participantCount = document.getElementById("participantCount");
    const emptyNote = document.getElementById("emptyNote");

    let currentSessionId = null;
    let currentParticipants = []; // { id, name, submitted, ... } の配列。ゲームスタート時のお題割り当てに使う。

    // 進行中パネルの「残り時間」表示、および３択ヒント用に、セッションの状態を監視しておく
    let currentSessionGenre = null;
    let sessionTimeLimitSec = null;
    let sessionStartedAtMillis = null;
    let progressCountdownInterval = null;

    function listenSession(sessionId){
        onSnapshot(doc(db, "sessions", sessionId), (snap) => {
            if(!snap.exists()) return;
            const data = snap.data();
            currentSessionGenre = data.genre || null;
            sessionTimeLimitSec = data.timeLimitSec || null;
            sessionStartedAtMillis = (data.startedAt && typeof data.startedAt.toMillis === "function")
                ? data.startedAt.toMillis() : null;
            updateProgressTimerDisplay();
        }, (err) => {
            console.error("セッション情報の監視に失敗:", err);
        });
    }

    // 生徒が「あと１分待って」を選ぶと timeLimitSec が延長されるので、
    // ここで残り時間の表示も自動的に更新される
    function updateProgressTimerDisplay(){
        const timerEl = document.getElementById("progressTimerDisplay");
        if(!timerEl) return;
        if(progressCountdownInterval){
            clearInterval(progressCountdownInterval);
            progressCountdownInterval = null;
        }
        if(!sessionTimeLimitSec || !sessionStartedAtMillis){
            timerEl.textContent = "";
            return;
        }
        function tick(){
            const elapsed = (Date.now() - sessionStartedAtMillis) / 1000;
            const remaining = Math.max(0, Math.round(sessionTimeLimitSec - elapsed));
            const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
            const ss = String(remaining % 60).padStart(2, "0");
            timerEl.textContent = `残り時間 ${mm}:${ss}`;
            timerEl.style.color = remaining <= 0 ? "#ff4d4d" : "#ffe066";
        }
        tick();
        progressCountdownInterval = setInterval(tick, 1000);
    }

    // 頭文字の一致判定に使う（「ア」と「あ」を同じ扱いにするため kataToHira で正規化する）
    function normalizedFirstChar(str){
        if(!str) return "";
        return kataToHira(str.charAt(0));
    }

    // 教員画面のタブがChromebook等でリロード（バックグラウンドで自動破棄→復帰時に再読み込み等）
    // されてしまった場合に、進行中のセッションへ自動復帰するためのキー
    const TEACHER_SESSION_KEY = "tsutaeboshi_teacher_session";

    // セッションIDをランダムな英数字6文字で生成する（QRコードやURLに使う短い識別子）
    function generateSessionId(){
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字(0,O,1,I)は除外
        let id = "";
        for(let i = 0; i < 6; i++){
            id += chars[Math.floor(Math.random() * chars.length)];
        }
        return id;
    }

    createSessionBtn.addEventListener("click", async () => {
        const genre = document.getElementById("genreInput").value;
        const timeLimitMin = parseFloat(document.getElementById("timeLimitInput").value) || 10;
        const maxPieces = parseInt(document.getElementById("maxPiecesInput").value) || 30;
        const sessionId = generateSessionId();
        currentSessionId = sessionId;

        createSessionBtn.disabled = true;
        createSessionBtn.textContent = "作成中…";

        try {
            await setDoc(doc(db, "sessions", sessionId), {
                genre,
                themeList: (GENRE_THEMES[genre] || []).map(themeText),
                timeLimitSec: Math.round(timeLimitMin * 60),
                maxPieces,
                status: "waiting", // waiting → creating → presenting の順に進む予定
                createdAt: serverTimestamp()
            });

            // 教員側のタブがChromebook等でリロードされても復帰できるよう、セッションIDを保存しておく
            localStorage.setItem(TEACHER_SESSION_KEY, sessionId);

            showSessionPanel(sessionId);
            listenParticipants(sessionId);
            listenSession(sessionId);
        } catch(err){
            console.error(err);
            alert("セッションの作成に失敗しました。通信状況を確認してもう一度お試しください。");
            createSessionBtn.disabled = false;
            createSessionBtn.textContent = "セッションを作成する";
        }
    });

    function showSessionPanel(sessionId){
        setupPanel.style.display = "none";
        sessionPanel.style.display = "block";
        document.getElementById("sessionIdText").textContent = sessionId;

        // student.html は teacher.html と同じ場所に置く想定。
        // 今開いているteacher.htmlのURLから、同じ階層のstudent.htmlのURLを組み立てる。
        const studentUrl = new URL("student.html", window.location.href);
        studentUrl.searchParams.set("session", sessionId);

        document.getElementById("joinUrlText").textContent = studentUrl.href;

        new QRCode(document.getElementById("qrcode"), {
            text: studentUrl.href,
            width: 200,
            height: 200
        });
    }

    function listenParticipants(sessionId){
        const participantsRef = collection(db, "sessions", sessionId, "participants");
        onSnapshot(participantsRef, (snapshot) => {
            participantList.innerHTML = "";
            participantCount.textContent = snapshot.size;
            emptyNote.style.display = snapshot.size === 0 ? "block" : "none";
            currentParticipants = [];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                currentParticipants.push({ id: docSnap.id, ...data });
                const li = document.createElement("li");
                li.textContent = data.name || "（名前未設定）";
                participantList.appendChild(li);
            });
            startGameBtn.disabled = currentParticipants.length === 0;
            renderProgressList();
        }, (err) => {
            console.error("参加者一覧の取得に失敗:", err);
        });
    }

    // ページ読み込み時に、進行中のセッションがあれば自動的に復帰する
    async function resumeSessionIfAny(){
        const savedSessionId = localStorage.getItem(TEACHER_SESSION_KEY);
        if(!savedSessionId) return;

        try {
            const sessionSnap = await getDoc(doc(db, "sessions", savedSessionId));
            if(!sessionSnap.exists()){
                // セッションが存在しない（削除済み等）場合は保存情報を破棄して最初の画面のまま
                localStorage.removeItem(TEACHER_SESSION_KEY);
                return;
            }

            currentSessionId = savedSessionId;
            const sessionData = sessionSnap.data();

            showSessionPanel(savedSessionId);

            // status に応じて表示するパネルを合わせる
            // waiting: 参加者待ち画面のまま／creating・presenting: 進行中パネルへ
            if(sessionData.status && sessionData.status !== "waiting"){
                sessionPanel.style.display = "none";
                progressPanel.style.display = "block";
            }

            // 参加者リスナーを再接続すると、現在の提出状況に応じて
            // 「伝え星」スタートボタン等も自動的に正しい表示状態になる
            listenParticipants(savedSessionId);
            listenSession(savedSessionId);
        } catch(err){
            console.error("セッションの復帰に失敗:", err);
        }
    }
    resumeSessionIfAny();

    function resetToNewSession(e){
        e.preventDefault();
        if(!confirm("現在のセッションから離れて、新しいセッションを作成しますか？\n（すでに進行中の場合、生徒側の画面はそのまま残ります）")) return;
        localStorage.removeItem(TEACHER_SESSION_KEY);
        location.reload();
    }
    document.getElementById("resetSessionLink").addEventListener("click", resetToNewSession);
    document.getElementById("resetSessionLink2").addEventListener("click", resetToNewSession);

    // 配列をランダムな順序に並べ替える（Fisher-Yatesシャッフル）
    function shuffle(array){
        const arr = [...array];
        for(let i = arr.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    startGameBtn.addEventListener("click", async () => {
        if(currentParticipants.length === 0 || !currentSessionId) return;
        startGameBtn.disabled = true;
        startGameBtn.textContent = "開始中…";

        try {
            // お題候補をシャッフルし、参加者数分に足りない場合はさらにシャッフルして繰り返し使う
            const sessionSnapForThemes = GENRE_THEMES[document.getElementById("genreInput").value] || [];
            let themePool = shuffle(sessionSnapForThemes);
            const assignments = currentParticipants.map((p, i) => {
                if(i > 0 && i % themePool.length === 0){
                    themePool = shuffle(sessionSnapForThemes); // 一周したら再シャッフルして続ける
                }
                return { participantId: p.id, theme: themeText(themePool[i % themePool.length]) };
            });

            const batch = writeBatch(db);
            assignments.forEach(a => {
                const pRef = doc(db, "sessions", currentSessionId, "participants", a.participantId);
                batch.update(pRef, { theme: a.theme });
            });
            const sessionRef = doc(db, "sessions", currentSessionId);
            batch.update(sessionRef, { status: "creating", startedAt: serverTimestamp() });
            await batch.commit();

            sessionPanel.style.display = "none";
            progressPanel.style.display = "block";
        } catch(err){
            console.error(err);
            alert("ゲームの開始に失敗しました。通信状況を確認してもう一度お試しください。");
            startGameBtn.disabled = false;
            startGameBtn.textContent = "ゲームスタート";
        }
    });

    function renderProgressList(){
        progressList.innerHTML = "";
        currentParticipants.forEach(p => {
            const li = document.createElement("li");
            const nameSpan = document.createElement("span");
            nameSpan.textContent = p.name || "（名前未設定）";
            const statusSpan = document.createElement("span");
            if(p.submitted){
                statusSpan.textContent = "提出済み";
                statusSpan.className = "status-submitted";
            } else {
                statusSpan.textContent = "未提出";
                statusSpan.className = "status-pending";
            }
            li.appendChild(nameSpan);
            li.appendChild(statusSpan);
            progressList.appendChild(li);
        });

        const allSubmitted = currentParticipants.length > 0 && currentParticipants.every(p => p.submitted);
        startPresentBtn.style.display = allSubmitted ? "inline-block" : "none";
    }

    // ===== 発表フェーズ =====
    let presentationQueue = [];
    let presentationIndex = 0;
    let currentPresentedParticipant = null;
    // 星のかけら（正解した人数などに応じて集まる）。星座ごとにリセットせず、発表フェーズ全体で累積する
    let starFragments = 0;
    let completedStars = 0;
    const FRAGMENTS_PER_STAR = 10;
    const NO_HINT_BONUS = 10; // ヒントなしで正解できたときの特大ボーナス

    // 現在の４択クイズの状態
    let currentChoices = [];
    let correctChoiceIndex = -1;
    let answererSelections = {}; // participantId -> 選んだ選択肢のindex
    let quizRevealed = false;

    startPresentBtn.addEventListener("click", () => {
        presentationQueue = shuffle(currentParticipants);
        presentationIndex = 0;
        starFragments = 0;
        completedStars = 0;
        progressPanel.style.display = "none";
        presentPanel.style.display = "block";
        presentFinished.style.display = "none";
        showNextConstellation();
    });

    function showNextConstellation(){
        if(presentationIndex >= presentationQueue.length){
            presentPanel.style.display = "none";
            presentFinished.style.display = "block";
            document.getElementById("finalStarMessage").textContent = getFinalStarMessage();
            return;
        }
        currentPresentedParticipant = presentationQueue[presentationIndex];
        presentationIndex++;

        presentProgress.textContent = `${presentationIndex} / ${presentationQueue.length} 人目`;

        // クイズ状態をリセット
        currentChoices = [];
        correctChoiceIndex = -1;
        answererSelections = {};
        quizRevealed = false;

        hintAnswerBox.style.display = "none";
        answerText.innerHTML = "";
        quizBox.style.display = "none";
        choiceList.innerHTML = "";
        answererList.innerHTML = "";
        presentControlsMain.style.display = "flex";
        noHintCorrectBtn.disabled = false;
        showChoicesBtn.disabled = false;
        answerBtn.style.display = "inline-block";

        updateStarGaugeDisplay();
        renderConstellation(currentPresentedParticipant);
    }

    // 参加者の提出データ（piecesData・canvasWidth/Height）を、教員画面のビュー枠に縮尺を合わせて描画する
    function renderConstellation(participant){
        constellationView.innerHTML = "";
        const pieces = participant.piecesData || [];
        const srcW = participant.canvasWidth || 375;
        const srcH = participant.canvasHeight || 600;
        const rect = constellationView.getBoundingClientRect();
        const scale = Math.min(rect.width / srcW, rect.height / srcH);
        const offsetX = (rect.width - srcW * scale) / 2;
        const offsetY = (rect.height - srcH * scale) / 2;

        pieces.forEach(p => {
            const span = document.createElement("div");
            span.className = "piece";
            span.textContent = labelForPresent(p.type);
            span.style.left = (offsetX + p.x * scale) + "px";
            span.style.top = (offsetY + p.y * scale) + "px";
            span.style.fontSize = (22 * scale) + "px";
            span.style.transform = `rotate(${p.angle}deg)`;
            constellationView.appendChild(span);
        });
    }

    function labelForPresent(type){
        if(type === 'star') return "●";
        if(type === 'short') return "●──●";
        if(type === 'mid') return "●────●";
        if(type === 'long') return "●────────●";
        return "";
    }

    function imageSearchUrl(word){
        return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(word)}`;
    }

    // 星のかけらを加算し、しきい値を超えたら「きれいな星」完成のお祝いを出す
    function addFragments(n){
        if(n <= 0) return;
        starFragments += n;
        const newCompleted = Math.floor(starFragments / FRAGMENTS_PER_STAR);
        if(newCompleted > completedStars){
            completedStars = newCompleted;
            showStarCelebration(completedStars);
        }
        updateStarGaugeDisplay();
    }

    function updateStarGaugeDisplay(){
        const inCurrent = starFragments % FRAGMENTS_PER_STAR;
        starGaugeText.textContent = `✨ 星のかけら ${inCurrent} / ${FRAGMENTS_PER_STAR}　（きれいな星：${completedStars}個）`;
    }

    function getStarCelebrationText(count){
        if(count === 1) return "きれいな星が完成！\nおめでとう！";
        if(count === 2) return "きれいな星が２個できた！\nさらにおめでとう！";
        if(count === 3) return "きれいな星が３個できた！\nさらにさらにおめでとう！";
        return `きれいな星が${count}個できた！\nみんなの力の結晶だね、すごい！`;
    }

    function showStarCelebration(count){
        starCelebrationMessage.textContent = getStarCelebrationText(count);
        starCelebrationOverlay.style.display = "flex";
    }
    starCelebrationCloseBtn.addEventListener("click", () => {
        starCelebrationOverlay.style.display = "none";
    });

    // 発表が全部終わった時の、完成した星の数に応じた前向きなメッセージ
    function getFinalStarMessage(){
        if(completedStars <= 0 && starFragments <= 0){
            return "みんなの発表、おつかれさまでした！次はどんな星が完成するか楽しみだね。";
        } else if(completedStars === 0){
            return `星のかけらが${starFragments}個集まりました！あと少しで星が完成しそうだね。`;
        } else if(completedStars === 1){
            return "きれいな星が１個完成しました！おめでとう！みんなよくがんばったね。";
        } else if(completedStars === 2){
            return "きれいな星が２個も完成しました！さらにおめでとう！最高のチームワークだったね。";
        } else {
            return `きれいな星が${completedStars}個も完成しました！さらにさらにおめでとう！みんなの力の結晶だね、すごい！`;
        }
    }

    // お題と同じジャンルの中から、頭文字が一致する候補を優先して４択（正解＋３つ）を作る
    function buildChoiceOptions(participant){
        const theme = participant.theme || "";
        const pool = (GENRE_THEMES[currentSessionGenre] || []).map(themeText).filter(w => w !== theme);
        const targetFirst = normalizedFirstChar(theme);
        const sameFirstPool = shuffle(pool.filter(w => normalizedFirstChar(w) === targetFirst));

        const distractors = sameFirstPool.slice(0, 3);
        if(distractors.length < 3){
            const rest = shuffle(pool.filter(w => !distractors.includes(w)));
            while(distractors.length < 3 && rest.length > 0){
                distractors.push(rest.pop());
            }
        }
        return shuffle([theme, ...distractors]);
    }

    const CHOICE_LABELS = ["①", "②", "③", "④"];

    function renderChoiceList(){
        choiceList.innerHTML = "";
        currentChoices.forEach((word, i) => {
            const chip = document.createElement("div");
            chip.className = "choice-chip";

            const labelSpan = document.createElement("span");
            labelSpan.className = "choice-label";
            labelSpan.textContent = CHOICE_LABELS[i] || "";
            chip.appendChild(labelSpan);

            const wordSpan = document.createElement("span");
            wordSpan.innerHTML = buildFuriganaHtml(word);
            chip.appendChild(wordSpan);

            const link = document.createElement("a");
            link.href = imageSearchUrl(word);
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = "🔍 画像検索";
            chip.appendChild(link);

            choiceList.appendChild(chip);
        });
    }

    function renderAnswererRows(){
        answererList.innerHTML = "";
        const others = currentParticipants.filter(p => p.id !== currentPresentedParticipant.id);

        if(others.length === 0){
            const note = document.createElement("div");
            note.style.color = "#9fb3ff";
            note.textContent = "（他の参加者がいません）";
            answererList.appendChild(note);
            return;
        }

        others.forEach(p => {
            const row = document.createElement("div");
            row.className = "answerer-row";
            row.dataset.participantId = p.id;

            const nameSpan = document.createElement("span");
            nameSpan.className = "answerer-name";
            nameSpan.textContent = p.name || "（名前未設定）";
            row.appendChild(nameSpan);

            currentChoices.forEach((word, i) => {
                const btn = document.createElement("button");
                btn.className = "answerer-choice-btn";
                btn.textContent = CHOICE_LABELS[i] || "";
                btn.dataset.idx = i;
                btn.addEventListener("click", () => {
                    if(quizRevealed) return;
                    answererSelections[p.id] = i;
                    row.querySelectorAll(".answerer-choice-btn").forEach(b => b.classList.remove("selected"));
                    btn.classList.add("selected");
                });
                row.appendChild(btn);
            });

            const resultIcon = document.createElement("span");
            resultIcon.className = "answerer-result-icon";
            row.appendChild(resultIcon);

            answererList.appendChild(row);
        });
    }

    // 正解発表の共通部分（お題名をふりがな付きで表示し、画像検索リンクを付ける）
    function revealAnswerCore(){
        const theme = currentPresentedParticipant.theme || "";

        answerText.innerHTML = "";
        const textSpan = document.createElement("span");
        textSpan.innerHTML = `${escapeHtml(currentPresentedParticipant.name)}さん作「${renderConstellationNameHtml(theme)}」でした！　`;
        answerText.appendChild(textSpan);

        const link = document.createElement("a");
        link.href = imageSearchUrl(theme);
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.style.color = "#9fb3ff";
        link.style.fontSize = "14px";
        link.textContent = "🔍 画像検索";
        answerText.appendChild(link);

        hintAnswerBox.style.display = "block";
    }

    noHintCorrectBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        revealAnswerCore();
        addFragments(NO_HINT_BONUS);

        const bonusNote = document.createElement("div");
        bonusNote.style.marginTop = "10px";
        bonusNote.style.color = "#c9a6ff";
        bonusNote.style.fontWeight = "bold";
        bonusNote.textContent = `🌠 ヒントなしで大正解！ 星のかけら +${NO_HINT_BONUS}！`;
        answerText.parentElement.appendChild(bonusNote);

        presentControlsMain.style.display = "none";
        answerBtn.style.display = "none";
    });

    showChoicesBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        currentChoices = buildChoiceOptions(currentPresentedParticipant);
        correctChoiceIndex = currentChoices.indexOf(currentPresentedParticipant.theme);
        answererSelections = {};
        quizRevealed = false;

        renderChoiceList();
        renderAnswererRows();
        quizBox.style.display = "block";
        presentControlsMain.style.display = "none";
    });

    answerBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        revealAnswerCore();

        if(quizBox.style.display === "block" && !quizRevealed){
            quizRevealed = true;
            let correctCount = 0;

            answererList.querySelectorAll(".answerer-row").forEach(row => {
                const pid = row.dataset.participantId;
                const sel = answererSelections[pid];
                const icon = row.querySelector(".answerer-result-icon");

                row.querySelectorAll(".answerer-choice-btn").forEach((b, i) => {
                    b.disabled = true;
                    if(i === correctChoiceIndex) b.classList.add("correct");
                    else if(i === sel) b.classList.add("incorrect");
                });

                if(sel === correctChoiceIndex){
                    correctCount++;
                    icon.textContent = "○";
                    icon.style.color = "#6bffb0";
                } else if(sel !== undefined){
                    icon.textContent = "×";
                    icon.style.color = "#ff8a8a";
                } else {
                    icon.textContent = "－";
                    icon.style.color = "#9fb3ff";
                }
            });

            if(correctCount > 0) addFragments(correctCount);

            const summary = document.createElement("div");
            summary.style.marginTop = "10px";
            summary.style.color = "#ffe066";
            summary.style.fontWeight = "bold";
            summary.textContent = correctCount > 0
                ? `正解者 ${correctCount}人！ 星のかけら +${correctCount}`
                : "今回は正解者なし。次はきっと当たるよ！";
            answererList.appendChild(summary);
        }

        answerBtn.style.display = "none";
    });

    nextBtn.addEventListener("click", showNextConstellation);
</script>
