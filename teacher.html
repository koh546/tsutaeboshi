<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伝え星（つたえぼし） - 教員用</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: "Hiragino Sans", "Meiryo", sans-serif;
        background: #0b1020;
        color: white;
        min-height: 100vh;
        padding: 24px;
    }
    h1 {
        margin: 0 0 4px 0;
        font-size: 28px;
        color: #ffe066;
    }
    .subtitle {
        color: #9fb3ff;
        margin-bottom: 24px;
    }
    .panel {
        background: #111a33;
        border-radius: 12px;
        padding: 20px 24px;
        margin-bottom: 20px;
        max-width: 640px;
    }
    label {
        display: block;
        margin-bottom: 6px;
        color: #9fb3ff;
        font-size: 14px;
    }
    .field {
        margin-bottom: 16px;
    }
    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #1c2a55;
        color: white;
        font-size: 16px;
    }
    button {
        background: #2b4cff;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover { background: #1a35cc; }
    button:disabled { background: #3a4166; cursor: not-allowed; }

    #sessionPanel { display: none; }
    .session-info {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        align-items: flex-start;
    }
    #qrcode {
        background: white;
        padding: 12px;
        border-radius: 8px;
        display: inline-block;
    }
    .join-url {
        margin-top: 10px;
        font-size: 13px;
        color: #9fb3ff;
        word-break: break-all;
        max-width: 260px;
    }
    .session-id {
        font-size: 14px;
        color: #9fb3ff;
    }
    .session-id b {
        color: #ffe066;
        font-size: 20px;
        letter-spacing: 2px;
    }
    #participantList {
        list-style: none;
        padding: 0;
        margin: 12px 0 0 0;
        min-width: 220px;
    }
    #participantList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
    }
    #participantCount {
        color: #ffe066;
        font-weight: bold;
    }
    .empty-note {
        color: #6a76a8;
        font-size: 14px;
    }
    #progressList li {
        background: #1c2a55;
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 6px;
        font-size: 15px;
        display: flex;
        justify-content: space-between;
    }
    .status-submitted { color: #6bffb0; }
    .status-pending { color: #ffb066; }

    #startPresentBtn { margin-top: 16px; display: none; }

    #presentPanel {
        display: none;
        max-width: 900px;
    }
    .present-progress {
        color: #9fb3ff;
        font-size: 14px;
        margin-bottom: 10px;
    }
    #constellationView {
        position: relative;
        height: 55vh;
        background: radial-gradient(circle at center, #0b1a3a, #050814);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 16px;
    }
    #constellationView .piece {
        position: absolute;
        color: white;
        font-size: 22px;
        text-shadow: 0 0 6px rgba(255,255,255,0.7);
        transform-origin: center center;
        white-space: nowrap;
    }
    .present-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
    }
    .hint-answer-box {
        background: #1c2a55;
        border-radius: 8px;
        padding: 12px 16px;
        margin-bottom: 16px;
        min-height: 24px;
        font-size: 18px;
    }
    #hintText { color: #ffe066; margin-bottom: 6px; }
    #hintText:empty { margin-bottom: 0; }
    #answerText { color: #6bffb0; font-weight: bold; }
    .choice-hint-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #26315c;
        border-radius: 6px;
        padding: 6px 10px;
        margin: 4px 8px 4px 0;
        font-size: 16px;
    }
    .choice-hint-item a {
        color: #9fb3ff;
        font-size: 13px;
        text-decoration: none;
        border-bottom: 1px dotted #9fb3ff;
    }
    .choice-hint-item a:hover { color: #ffe066; }
    #empathyBtn {
        background: #cc7a00;
    }
    #empathyBtn:hover { background: #a86400; }
    .empathy-count {
        color: #ffe066;
        font-weight: bold;
        font-size: 18px;
        margin-left: 8px;
    }
    #progressTimerDisplay:empty { display: none; }
    #presentFinished {
        display: none;
        text-align: center;
        padding: 20px;
    }
</style>
</head>
<body>

<h1>伝え星（つたえぼし）</h1>
<div class="subtitle">教員用画面</div>

<!-- セッション作成フォーム -->
<div class="panel" id="setupPanel">
    <div class="field">
        <label for="genreInput">ジャンル</label>
        <select id="genreInput">
            <option value="動物">動物</option>
            <option value="食べ物">食べ物</option>
            <option value="乗り物">乗り物</option>
        </select>
    </div>
    <div class="field">
        <label for="timeLimitInput">制限時間（分）</label>
        <input type="number" id="timeLimitInput" value="10" min="1">
    </div>
    <div class="field">
        <label for="maxPiecesInput">制限パーツ数（本）</label>
        <input type="number" id="maxPiecesInput" value="30" min="1">
    </div>
    <button id="createSessionBtn">セッションを作成する</button>
</div>

<!-- セッション作成後の表示 -->
<div class="panel" id="sessionPanel">
    <div class="session-info">
        <div>
            <div id="qrcode"></div>
            <div class="join-url" id="joinUrlText"></div>
        </div>
        <div>
            <div class="session-id">セッションID：<b id="sessionIdText"></b></div>
            <div style="margin-top:16px;">
                参加者：<span id="participantCount">0</span>人
            </div>
            <ul id="participantList"></ul>
            <div class="empty-note" id="emptyNote">まだ誰も参加していません</div>
            <button id="startGameBtn" style="margin-top:16px;" disabled>ゲームスタート</button>
            <div style="margin-top:14px;">
                <a href="#" id="resetSessionLink" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
            </div>
        </div>
    </div>
</div>

<!-- ゲーム進行中（お題配布後）の表示 -->
<div class="panel" id="progressPanel" style="display:none;">
    <div class="subtitle" style="margin-bottom:4px;">ゲーム進行中：生徒は伝え星を制作しています</div>
    <div id="progressTimerDisplay" style="color:#ffe066; font-weight:bold; margin-bottom:12px;"></div>
    <ul id="progressList" style="list-style:none; padding:0; margin:0;"></ul>
    <button id="startPresentBtn">「伝え星」スタート</button>
    <div style="margin-top:14px;">
        <a href="#" id="resetSessionLink2" style="color:#6a76a8; font-size:13px;">別の新しいセッションを作る</a>
    </div>
</div>

<!-- 発表フェーズ -->
<div class="panel" id="presentPanel">
    <div class="present-progress" id="presentProgress"></div>
    <div id="constellationView"></div>
    <div class="hint-answer-box" id="hintAnswerBox" style="display:none;">
        <div id="hintText"></div>
        <div id="answerText"></div>
        <div id="choiceHintBox" style="display:none; margin-top:10px;"></div>
    </div>
    <div class="present-controls">
        <button id="hintBtn">💡 ヒント（1文字目）</button>
        <button id="choiceHintBtn">🔤 ヒント（選択肢）</button>
        <button id="answerBtn">✅ こたえを見る</button>
        <button id="empathyBtn">⭐ 共感スター<span class="empathy-count" id="empathyCount">0</span></button>
        <button id="nextBtn">次の星座へ ▶</button>
    </div>
</div>
<div class="panel" id="presentFinished">
    <h2 style="color:#ffe066;">全員の発表が終わりました！</h2>
    <p class="subtitle">おつかれさまでした。</p>
    <p id="totalEmpathyMessage" style="font-size:20px; color:#ffe066; font-weight:bold; margin-top:16px;"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
        getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, serverTimestamp, writeBatch, increment
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // ▼ Firebaseプロジェクトの設定（tsutaeboshiプロジェクト）
    const firebaseConfig = {
        apiKey: "AIzaSyDKVX2XQOarobvskKYgNiWn__cDZwni7gk",
        authDomain: "tsutaeboshi.firebaseapp.com",
        projectId: "tsutaeboshi",
        storageBucket: "tsutaeboshi.firebasestorage.app",
        messagingSenderId: "797492485045",
        appId: "1:797492485045:web:1f8eca9ba07a2f0b2dd7fc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ジャンルごとのお題候補（今後、必要に応じて追加・編集可能）
    // ３択ヒントで同じ頭文字の候補を出しやすいよう、頭文字が重なる単語も多めに入れてある
    const GENRE_THEMES = {
        "動物": ["ライオン", "ペンギン", "クマ", "キリン", "ゾウ", "パンダ", "サル", "ウサギ", "カメ", "イルカ", "キツネ", "コアラ", "カバ", "トラ", "シマウマ",
                 "アリ", "アライグマ", "イヌ", "ネコ", "ヒツジ", "ワニ", "クジラ", "サメ", "タヌキ", "ハト"],
        "食べ物": ["リンゴ", "バナナ", "ドーナツ", "ハンバーガー", "ソフトクリーム", "おにぎり", "ラーメン", "ピザ", "いちご", "すいか", "たこ焼き", "カレー", "プリン", "パン", "すし",
                 "アイス", "あんこ", "アメ", "いなり寿司", "うどん", "えびフライ", "おでん", "ぎょうざ", "ケーキ", "ゼリー", "チョコレート", "ナン", "ハンバーグ", "まんじゅう", "やきそば"],
        "乗り物": ["電車", "ひこうき", "車", "船", "ロケット", "バス", "自転車", "ヘリコプター", "消防車", "救急車", "タクシー", "気球", "バイク", "新幹線", "パトカー",
                 "トラック", "ヨット", "スクーター", "モノレール", "フェリー", "リムジン", "ボート", "ケーブルカー", "トロッコ", "ゴーカート"]
    };

    const setupPanel = document.getElementById("setupPanel");
    const sessionPanel = document.getElementById("sessionPanel");
    const progressPanel = document.getElementById("progressPanel");
    const progressList = document.getElementById("progressList");
    const startPresentBtn = document.getElementById("startPresentBtn");
    const presentPanel = document.getElementById("presentPanel");
    const presentFinished = document.getElementById("presentFinished");
    const presentProgress = document.getElementById("presentProgress");
    const constellationView = document.getElementById("constellationView");
    const hintAnswerBox = document.getElementById("hintAnswerBox");
    const hintText = document.getElementById("hintText");
    const answerText = document.getElementById("answerText");
    const hintBtn = document.getElementById("hintBtn");
    const choiceHintBtn = document.getElementById("choiceHintBtn");
    const choiceHintBox = document.getElementById("choiceHintBox");
    const answerBtn = document.getElementById("answerBtn");
    const empathyBtn = document.getElementById("empathyBtn");
    const empathyCount = document.getElementById("empathyCount");
    const nextBtn = document.getElementById("nextBtn");
    const createSessionBtn = document.getElementById("createSessionBtn");
    const startGameBtn = document.getElementById("startGameBtn");
    const participantList = document.getElementById("participantList");
    const participantCount = document.getElementById("participantCount");
    const emptyNote = document.getElementById("emptyNote");

    let currentSessionId = null;
    let currentParticipants = []; // { id, name, submitted, ... } の配列。ゲームスタート時のお題割り当てに使う。

    // 進行中パネルの「残り時間」表示、および３択ヒント用に、セッションの状態を監視しておく
    let currentSessionGenre = null;
    let sessionTimeLimitSec = null;
    let sessionStartedAtMillis = null;
    let progressCountdownInterval = null;

    function listenSession(sessionId){
        onSnapshot(doc(db, "sessions", sessionId), (snap) => {
            if(!snap.exists()) return;
            const data = snap.data();
            currentSessionGenre = data.genre || null;
            sessionTimeLimitSec = data.timeLimitSec || null;
            sessionStartedAtMillis = (data.startedAt && typeof data.startedAt.toMillis === "function")
                ? data.startedAt.toMillis() : null;
            updateProgressTimerDisplay();
        }, (err) => {
            console.error("セッション情報の監視に失敗:", err);
        });
    }

    // 生徒が「あと１分待って」を選ぶと timeLimitSec が延長されるので、
    // ここで残り時間の表示も自動的に更新される
    function updateProgressTimerDisplay(){
        const timerEl = document.getElementById("progressTimerDisplay");
        if(!timerEl) return;
        if(progressCountdownInterval){
            clearInterval(progressCountdownInterval);
            progressCountdownInterval = null;
        }
        if(!sessionTimeLimitSec || !sessionStartedAtMillis){
            timerEl.textContent = "";
            return;
        }
        function tick(){
            const elapsed = (Date.now() - sessionStartedAtMillis) / 1000;
            const remaining = Math.max(0, Math.round(sessionTimeLimitSec - elapsed));
            const mm = String(Math.floor(remaining / 60)).padStart(2, "0");
            const ss = String(remaining % 60).padStart(2, "0");
            timerEl.textContent = `残り時間 ${mm}:${ss}`;
            timerEl.style.color = remaining <= 0 ? "#ff4d4d" : "#ffe066";
        }
        tick();
        progressCountdownInterval = setInterval(tick, 1000);
    }

    // 全角カタカナをひらがなに正規化する（頭文字の一致判定に使う。「ア」と「あ」を同じ扱いにするため）
    function toHiragana(str){
        return str.replace(/[\u30a1-\u30f6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }
    function normalizedFirstChar(str){
        if(!str) return "";
        return toHiragana(str.charAt(0));
    }

    // 教員画面のタブがChromebook等でリロード（バックグラウンドで自動破棄→復帰時に再読み込み等）
    // されてしまった場合に、進行中のセッションへ自動復帰するためのキー
    const TEACHER_SESSION_KEY = "tsutaeboshi_teacher_session";

    // セッションIDをランダムな英数字6文字で生成する（QRコードやURLに使う短い識別子）
    function generateSessionId(){
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 紛らわしい文字(0,O,1,I)は除外
        let id = "";
        for(let i = 0; i < 6; i++){
            id += chars[Math.floor(Math.random() * chars.length)];
        }
        return id;
    }

    createSessionBtn.addEventListener("click", async () => {
        const genre = document.getElementById("genreInput").value;
        const timeLimitMin = parseFloat(document.getElementById("timeLimitInput").value) || 10;
        const maxPieces = parseInt(document.getElementById("maxPiecesInput").value) || 30;
        const sessionId = generateSessionId();
        currentSessionId = sessionId;

        createSessionBtn.disabled = true;
        createSessionBtn.textContent = "作成中…";

        try {
            await setDoc(doc(db, "sessions", sessionId), {
                genre,
                themeList: GENRE_THEMES[genre] || [],
                timeLimitSec: Math.round(timeLimitMin * 60),
                maxPieces,
                status: "waiting", // waiting → creating → presenting の順に進む予定
                createdAt: serverTimestamp()
            });

            // 教員側のタブがChromebook等でリロードされても復帰できるよう、セッションIDを保存しておく
            localStorage.setItem(TEACHER_SESSION_KEY, sessionId);

            showSessionPanel(sessionId);
            listenParticipants(sessionId);
            listenSession(sessionId);
        } catch(err){
            console.error(err);
            alert("セッションの作成に失敗しました。通信状況を確認してもう一度お試しください。");
            createSessionBtn.disabled = false;
            createSessionBtn.textContent = "セッションを作成する";
        }
    });

    function showSessionPanel(sessionId){
        setupPanel.style.display = "none";
        sessionPanel.style.display = "block";
        document.getElementById("sessionIdText").textContent = sessionId;

        // student.html は teacher.html と同じ場所に置く想定。
        // 今開いているteacher.htmlのURLから、同じ階層のstudent.htmlのURLを組み立てる。
        const studentUrl = new URL("student.html", window.location.href);
        studentUrl.searchParams.set("session", sessionId);

        document.getElementById("joinUrlText").textContent = studentUrl.href;

        new QRCode(document.getElementById("qrcode"), {
            text: studentUrl.href,
            width: 200,
            height: 200
        });
    }

    function listenParticipants(sessionId){
        const participantsRef = collection(db, "sessions", sessionId, "participants");
        onSnapshot(participantsRef, (snapshot) => {
            participantList.innerHTML = "";
            participantCount.textContent = snapshot.size;
            emptyNote.style.display = snapshot.size === 0 ? "block" : "none";
            currentParticipants = [];
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                currentParticipants.push({ id: docSnap.id, ...data });
                const li = document.createElement("li");
                li.textContent = data.name || "（名前未設定）";
                participantList.appendChild(li);
            });
            startGameBtn.disabled = currentParticipants.length === 0;
            renderProgressList();
        }, (err) => {
            console.error("参加者一覧の取得に失敗:", err);
        });
    }

    // ページ読み込み時に、進行中のセッションがあれば自動的に復帰する
    async function resumeSessionIfAny(){
        const savedSessionId = localStorage.getItem(TEACHER_SESSION_KEY);
        if(!savedSessionId) return;

        try {
            const sessionSnap = await getDoc(doc(db, "sessions", savedSessionId));
            if(!sessionSnap.exists()){
                // セッションが存在しない（削除済み等）場合は保存情報を破棄して最初の画面のまま
                localStorage.removeItem(TEACHER_SESSION_KEY);
                return;
            }

            currentSessionId = savedSessionId;
            const sessionData = sessionSnap.data();

            showSessionPanel(savedSessionId);

            // status に応じて表示するパネルを合わせる
            // waiting: 参加者待ち画面のまま／creating・presenting: 進行中パネルへ
            if(sessionData.status && sessionData.status !== "waiting"){
                sessionPanel.style.display = "none";
                progressPanel.style.display = "block";
            }

            // 参加者リスナーを再接続すると、現在の提出状況に応じて
            // 「伝え星」スタートボタン等も自動的に正しい表示状態になる
            listenParticipants(savedSessionId);
            listenSession(savedSessionId);
        } catch(err){
            console.error("セッションの復帰に失敗:", err);
        }
    }
    resumeSessionIfAny();

    function resetToNewSession(e){
        e.preventDefault();
        if(!confirm("現在のセッションから離れて、新しいセッションを作成しますか？\n（すでに進行中の場合、生徒側の画面はそのまま残ります）")) return;
        localStorage.removeItem(TEACHER_SESSION_KEY);
        location.reload();
    }
    document.getElementById("resetSessionLink").addEventListener("click", resetToNewSession);
    document.getElementById("resetSessionLink2").addEventListener("click", resetToNewSession);

    // 配列をランダムな順序に並べ替える（Fisher-Yatesシャッフル）
    function shuffle(array){
        const arr = [...array];
        for(let i = arr.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    startGameBtn.addEventListener("click", async () => {
        if(currentParticipants.length === 0 || !currentSessionId) return;
        startGameBtn.disabled = true;
        startGameBtn.textContent = "開始中…";

        try {
            // お題候補をシャッフルし、参加者数分に足りない場合はさらにシャッフルして繰り返し使う
            const sessionSnapForThemes = GENRE_THEMES[document.getElementById("genreInput").value] || [];
            let themePool = shuffle(sessionSnapForThemes);
            const assignments = currentParticipants.map((p, i) => {
                if(i > 0 && i % themePool.length === 0){
                    themePool = shuffle(sessionSnapForThemes); // 一周したら再シャッフルして続ける
                }
                return { participantId: p.id, theme: themePool[i % themePool.length] };
            });

            const batch = writeBatch(db);
            assignments.forEach(a => {
                const pRef = doc(db, "sessions", currentSessionId, "participants", a.participantId);
                batch.update(pRef, { theme: a.theme });
            });
            const sessionRef = doc(db, "sessions", currentSessionId);
            batch.update(sessionRef, { status: "creating", startedAt: serverTimestamp() });
            await batch.commit();

            sessionPanel.style.display = "none";
            progressPanel.style.display = "block";
        } catch(err){
            console.error(err);
            alert("ゲームの開始に失敗しました。通信状況を確認してもう一度お試しください。");
            startGameBtn.disabled = false;
            startGameBtn.textContent = "ゲームスタート";
        }
    });

    function renderProgressList(){
        progressList.innerHTML = "";
        currentParticipants.forEach(p => {
            const li = document.createElement("li");
            const nameSpan = document.createElement("span");
            nameSpan.textContent = p.name || "（名前未設定）";
            const statusSpan = document.createElement("span");
            if(p.submitted){
                statusSpan.textContent = "提出済み";
                statusSpan.className = "status-submitted";
            } else {
                statusSpan.textContent = "未提出";
                statusSpan.className = "status-pending";
            }
            li.appendChild(nameSpan);
            li.appendChild(statusSpan);
            progressList.appendChild(li);
        });

        const allSubmitted = currentParticipants.length > 0 && currentParticipants.every(p => p.submitted);
        startPresentBtn.style.display = allSubmitted ? "inline-block" : "none";
    }

    // ===== 発表フェーズ =====
    let presentationQueue = [];
    let presentationIndex = 0;
    let currentPresentedParticipant = null;
    let totalEmpathyStars = 0; // 星座ごとにリセットせず、発表フェーズ全体で累積していく共感スターの合計

    startPresentBtn.addEventListener("click", () => {
        presentationQueue = shuffle(currentParticipants);
        presentationIndex = 0;
        totalEmpathyStars = 0;
        progressPanel.style.display = "none";
        presentPanel.style.display = "block";
        presentFinished.style.display = "none";
        showNextConstellation();
    });

    function showNextConstellation(){
        if(presentationIndex >= presentationQueue.length){
            presentPanel.style.display = "none";
            presentFinished.style.display = "block";
            document.getElementById("totalEmpathyMessage").textContent = getEmpathyMessage(totalEmpathyStars);
            return;
        }
        currentPresentedParticipant = presentationQueue[presentationIndex];
        presentationIndex++;

        presentProgress.textContent = `${presentationIndex} / ${presentationQueue.length} 人目`;
        hintAnswerBox.style.display = "none";
        hintText.textContent = "";
        answerText.innerHTML = "";
        choiceHintBox.style.display = "none";
        choiceHintBox.innerHTML = "";
        empathyCount.textContent = totalEmpathyStars; // 星座が変わってもリセットせず、これまでの合計を表示し続ける

        renderConstellation(currentPresentedParticipant);
    }

    // 参加者の提出データ（piecesData・canvasWidth/Height）を、教員画面のビュー枠に縮尺を合わせて描画する
    function renderConstellation(participant){
        constellationView.innerHTML = "";
        const pieces = participant.piecesData || [];
        const srcW = participant.canvasWidth || 375;
        const srcH = participant.canvasHeight || 600;
        const rect = constellationView.getBoundingClientRect();
        const scale = Math.min(rect.width / srcW, rect.height / srcH);
        const offsetX = (rect.width - srcW * scale) / 2;
        const offsetY = (rect.height - srcH * scale) / 2;

        pieces.forEach(p => {
            const span = document.createElement("div");
            span.className = "piece";
            span.textContent = labelForPresent(p.type);
            span.style.left = (offsetX + p.x * scale) + "px";
            span.style.top = (offsetY + p.y * scale) + "px";
            span.style.fontSize = (22 * scale) + "px";
            span.style.transform = `rotate(${p.angle}deg)`;
            constellationView.appendChild(span);
        });
    }

    function labelForPresent(type){
        if(type === 'star') return "●";
        if(type === 'short') return "●──●";
        if(type === 'mid') return "●────●";
        if(type === 'long') return "●────────●";
        return "";
    }

    function imageSearchUrl(word){
        return `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(word)}`;
    }

    // 共感スターの合計数に応じて、常に前向きなメッセージを返す
    function getEmpathyMessage(total){
        if(total <= 0){
            return "みんなの発表、おつかれさまでした！これからも素敵な伝え星を作っていこうね。";
        } else if(total < 5){
            return `共感スターが${total}個集まりました！あたたかい気持ちが伝わりましたね。`;
        } else if(total < 15){
            return `共感スターが${total}個も集まりました！たくさんの共感が生まれましたね！`;
        } else if(total < 30){
            return `共感スターが${total}個も集まりました！素晴らしい発表ばかりでしたね！`;
        } else {
            return `共感スターが${total}個も集まりました！記録的な盛り上がりでした。すごい！`;
        }
    }

    // お題と同じジャンルの中から、頭文字が一致する候補を優先して３択（正解＋２つ）を作る
    function buildChoiceOptions(participant){
        const theme = participant.theme || "";
        const pool = (GENRE_THEMES[currentSessionGenre] || []).filter(w => w !== theme);
        const targetFirst = normalizedFirstChar(theme);
        const sameFirstPool = shuffle(pool.filter(w => normalizedFirstChar(w) === targetFirst));

        const distractors = sameFirstPool.slice(0, 2);
        if(distractors.length < 2){
            const rest = shuffle(pool.filter(w => !distractors.includes(w)));
            while(distractors.length < 2 && rest.length > 0){
                distractors.push(rest.pop());
            }
        }
        return shuffle([theme, ...distractors]);
    }

    hintBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        const theme = currentPresentedParticipant.theme || "";
        hintText.textContent = `ヒント：「${theme.charAt(0)}」からはじまるよ`;
        hintAnswerBox.style.display = "block";
    });

    choiceHintBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        const choices = buildChoiceOptions(currentPresentedParticipant);

        choiceHintBox.innerHTML = "";
        const label = document.createElement("div");
        label.style.color = "#9fb3ff";
        label.style.fontSize = "13px";
        label.style.marginBottom = "6px";
        label.textContent = "３択ヒント（このうちの１つが正解です）：";
        choiceHintBox.appendChild(label);

        choices.forEach(word => {
            const item = document.createElement("span");
            item.className = "choice-hint-item";

            const wordSpan = document.createElement("span");
            wordSpan.textContent = word;
            item.appendChild(wordSpan);

            const link = document.createElement("a");
            link.href = imageSearchUrl(word);
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = "🔍 画像検索";
            item.appendChild(link);

            choiceHintBox.appendChild(item);
        });

        choiceHintBox.style.display = "block";
        hintAnswerBox.style.display = "block";
    });

    answerBtn.addEventListener("click", () => {
        if(!currentPresentedParticipant) return;
        const theme = currentPresentedParticipant.theme || "";

        answerText.innerHTML = "";
        const textSpan = document.createElement("span");
        textSpan.textContent = `${currentPresentedParticipant.name}さん作「${theme}座」でした！　`;
        answerText.appendChild(textSpan);

        const link = document.createElement("a");
        link.href = imageSearchUrl(theme);
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.style.color = "#9fb3ff";
        link.style.fontSize = "14px";
        link.textContent = "🔍 画像検索";
        answerText.appendChild(link);

        hintAnswerBox.style.display = "block";
    });

    empathyBtn.addEventListener("click", async () => {
        if(!currentPresentedParticipant || !currentSessionId) return;
        // 表示上先に反映してから、Firestoreへも加算しておく（記録用に参加者ごとの内訳も残す）
        totalEmpathyStars++;
        empathyCount.textContent = totalEmpathyStars;
        try {
            const pRef = doc(db, "sessions", currentSessionId, "participants", currentPresentedParticipant.id);
            await updateDoc(pRef, { empathyStars: increment(1) });
        } catch(err){
            console.error("共感スターの加算に失敗:", err);
        }
    });

    nextBtn.addEventListener("click", showNextConstellation);
</script>

</body>
</html>
